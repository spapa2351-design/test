<!DOCTYPE html>
<html>
<head>
    <title>터치클래스 차세대 코스 구조 변경</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>터치클래스 차세대 코스 구조 변경</h1>
    <button onclick="location.href='1.html'">코스등록 UI 안</button>
    <button onclick="location.href='2.html'">2.html</button>
    <button onclick="location.href='3.html'">3.html</button>
    
    <script>
        function addButton(filename) {
            var newButton = document.createElement("button");
            newButton.textContent = filename;
            newButton.onclick = function() {
                location.href = filename;
            };
            document.body.appendChild(newButton);
        }

        var fileList = ["4.html", "5.html", "6.html"];

        for (var i = 0; i < fileList.length; i++) {
            addButton(fileList[i]);
        }
    </script>
</body>
</html>

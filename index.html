<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TouchClass</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;color:#0F172A;overflow:hidden;}
:root{--b:#4F46E5;--bl:#EEF2FF;--bd:#4338CA;--g:#10B981;--r:#EF4444;--bo:#E2E8F0;--bg:#F8FAFC;--tx:#0F172A;--mu:#64748B;--fa:#94A3B8;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.au{animation:fadeUp .28s both}.ai{animation:fadeIn .2s both}
.d1{animation-delay:.06s}.d2{animation-delay:.1s}.d3{animation-delay:.16s}
 
/* scrollbars */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
 
/* layout */
#app{height:100vh;display:flex;flex-direction:column}
.hdr{height:56px;background:#fff;border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
.body{flex:1;display:flex;overflow:hidden}
.lp{flex:1;overflow-y:auto;padding:24px 32px;background:var(--bg)}
.li{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:16px;padding-bottom:80px}
.rp{width:380px;background:#fff;border-left:1px solid var(--bo);display:flex;flex-direction:column;overflow:hidden}
 
/* cards */
.card{background:#fff;border-radius:14px;border:1px solid var(--bo);padding:22px 24px;box-shadow:0 1px 4px rgba(15,23,42,.04)}
.ct{font-size:15px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}
 
/* badge */
.bdg{display:inline-flex;align-items:center;border-radius:99px;font-size:10px;font-weight:700;padding:2px 8px}
.bi{background:#EEF2FF;color:#4F46E5}.bg{background:#ECFDF5;color:#059669}.br{background:#FEF2F2;color:#DC2626}.bs{background:#F1F5F9;color:#475569}
 
/* toggle */
.tog{width:40px;height:22px;border-radius:99px;background:#E2E8F0;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;border:none;outline:none}
.tog.on{background:var(--b)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog.on::after{transform:translateX(18px)}
 
/* radio */
.rad{width:16px;height:16px;border-radius:50%;border:2px solid #CBD5E1;display:inline-block;flex-shrink:0;cursor:pointer;transition:border .15s}
.rad.on{border-color:var(--b);border-width:5px}
 
/* inputs */
.fld{width:100%;border:1.5px solid var(--bo);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--tx);outline:none;background:#fff;font-family:inherit;transition:border-color .15s}
.fld:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.flbl{font-size:11px;font-weight:700;color:var(--fa);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
 
/* buttons */
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:10px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--b);color:#fff;padding:9px 18px;font-size:13px;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.bp:hover{background:var(--bd)}
.bs2{background:#fff;color:var(--mu);padding:9px 18px;font-size:13px;border:1.5px solid var(--bo)!important}
.bs2:hover{border-color:#94A3B8!important;color:var(--tx)}
 
/* option row */
.or{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #F8FAFC}
.or:last-child{border-bottom:none}
 
/* rule card */
.rc{border:1.5px solid var(--bo);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.rc.on{border-color:var(--b);background:#F5F7FF;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
 
/* info box */
.ib{background:#F0F4FF;border:1px solid #C7D2FE;border-radius:12px;padding:13px 15px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;font-size:12px;color:#4F46E5;line-height:1.6;font-weight:500}
 
/* table */
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:11px;font-weight:600;color:var(--fa);text-transform:uppercase;letter-spacing:.05em;padding:10px 8px;text-align:left;background:#F8FAFC;border-bottom:1px solid var(--bo)}
.stbl td{padding:8px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tbody tr:hover td{background:#FAFBFF}
 
/* batch btn */
.bbt{width:100%;padding:13px;background:#0F172A;color:#fff;font-weight:800;font-size:14px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.bbt:hover{background:#1E293B}
 
/* day btns */
.dw{display:flex;gap:5px}
.db{width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:700;border:1.5px solid var(--bo);background:#fff;color:var(--mu);cursor:pointer;font-family:inherit;transition:all .15s}
.db.on{background:var(--b);color:#fff;border-color:var(--b)}
 
/* roadmap */
.rmh{padding:14px 18px;border-bottom:1px solid #F1F5F9;background:#FAFBFD;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.rmb{flex:1;overflow-y:auto;padding:18px}
.rmf{padding:13px 16px;border-top:1px solid #F1F5F9;background:#FAFBFD;display:flex;gap:8px;flex-shrink:0}
.rmt{flex:1;padding:9px;background:#fff;border:1.5px solid var(--bo);border-radius:10px;font-size:11px;font-weight:700;color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s}
.rmt:hover{border-color:var(--b);color:var(--b)}
.rmc{position:relative;margin-bottom:22px}
.rmcl{position:absolute;left:11px;top:28px;bottom:-8px;width:2px;background:linear-gradient(to bottom,#E2E8F0 80%,transparent)}
.rmch{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative;z-index:1}
.rmn{width:24px;height:24px;background:#0F172A;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:800;color:#fff}
.rmis{padding-left:28px;display:flex;flex-direction:column;gap:8px}
.rmi{position:relative}
.rmi::before{content:'';position:absolute;left:-17px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #CBD5E1;z-index:1}
.rmi.nb::before{border-color:var(--b)}
.rmi.ng::before{border-color:var(--g)}
.rmic{background:#fff;border:1px solid var(--bo);border-radius:12px;padding:11px 13px;transition:all .15s;cursor:pointer}
.rmic:hover{border-color:var(--b);transform:translateX(2px)}
.rmic.gi{border-color:#A7F3D0;background:#F0FDF9}
.rqb{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid;flex-shrink:0;cursor:pointer;font-family:inherit;transition:all .15s}
.rqr{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.rqo{background:#F8FAFC;color:var(--fa);border-color:var(--bo)}
.cb{background:#F8FAFC;border:1px solid var(--bo);border-radius:8px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-top:8px}
.cb:hover{border-color:var(--b)}
 
/* modal */
.ovl{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:24px;z-index:200}
.mdl{background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(15,23,42,.25);overflow:hidden;animation:fadeUp .28s both}
.mh{padding:17px 22px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;background:#FAFBFD}
.mf{padding:14px 22px;border-top:1px solid #F1F5F9;background:#FAFBFD;display:flex;justify-content:flex-end;gap:8px}
.mb{padding:22px;overflow-y:auto;max-height:56vh}
 
/* lib modal */
.lbm{width:min(820px,92vw);height:560px;display:flex;flex-direction:column}
.lbs{display:flex;flex:1;overflow:hidden}
.lbsd{width:150px;border-right:1px solid #F1F5F9;background:#FAFBFD;padding:12px;flex-shrink:0}
.lbmn{flex:1;display:flex;flex-direction:column;padding:20px;overflow:hidden}
.lbl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.lbc{width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:13px;border:none;cursor:pointer;font-family:inherit;background:transparent;color:var(--mu);font-weight:500;display:block}
.lbc.on{background:#EEF2FF;color:#4F46E5;font-weight:700}
.lbi{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--bo);border-radius:12px;cursor:pointer;transition:all .15s}
.lbi:hover{border-color:var(--b);background:#F5F7FF}
 
/* selection screen */
.sel{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:900px;width:100%;margin-top:36px}
.tc{background:#fff;border-radius:20px;border:1.5px solid var(--bo);padding:28px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.tc:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(15,23,42,.1)}
.tci{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:22px}
.tcb{position:absolute;bottom:12px;right:12px;font-size:56px;opacity:.07;line-height:1;pointer-events:none}
 
/* notice */
.ofn{background:#FFF8F8;border:1px solid #FECDD3;border-radius:14px;padding:18px;text-align:center;margin-bottom:18px}
 
/* empty */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border:1.5px dashed #CBD5E1;border-radius:14px;background:#FAFBFC;text-align:center;gap:8px}
 
/* grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.rg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
 
/* utils */
.fl{display:flex}.ac{align-items:center}.sb{justify-content:space-between}.f1{flex:1}.mw0{min-width:0}
.col{flex-direction:column}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g14{gap:14px}.g16{gap:16px}.g18{gap:18px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb18{margin-bottom:18px}
.pt12{padding-top:12px}.bt{border-top:1px solid #F1F5F9}.bb{border-bottom:1px solid #F8FAFC}
.fw7{font-weight:700}.fw8{font-weight:800}
.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.cm{color:var(--mu)}.cf{color:var(--fa)}.cb2{color:var(--b)}
.uc{text-transform:uppercase;letter-spacing:.05em}
.tr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdot{width:6px;height:6px;border-radius:50%;background:#CBD5E1}
.pdot.on{width:20px;border-radius:3px;background:var(--b)}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator,
input[type=datetime-local]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5}
</style>
</head>

function ic(n,sz,col){
  var f=n==='zap'?'currentColor':'none';
  var s='display:inline-block;vertical-align:middle;flex-shrink:0;'+(col?'color:'+col+';':'');

// ─── LIB DATA ─────────────────────────────────────────────────────────────────

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML = S.view==='selection' ? selHTML() : editorHTML();
  bind();
}
 
// ── SELECTION ─────────────────────────────────────────────────────────────────
function selHTML(){
  var types=[
    {id:'online', e:'🎬',label:'온라인 코스',   bg:'#DBEAFE',desc:'비대면·자기주도 학습 과정을 설계합니다. VOD, 문서, 시험을 자유롭게 조합하세요.',tags:['VOD','문서','시험/퀴즈']},
    {id:'offline',e:'📍',label:'오프라인 코스',  bg:'#FFE4E6',desc:'집합 교육과 출석 관리에 최적화된 플로우입니다. QR 출석 및 회차 관리를 지원합니다.',tags:['회차 관리','QR 출석','수기 처리']},
    {id:'blended',e:'✨',label:'블렌디드 코스',  bg:'#EDE9FE',desc:'온/오프라인을 유기적으로 결합합니다. 사전·사후 학습부터 현장 교육, 평가까지 한 흐름으로.',tags:['온+오프 결합','사전 학습']}
  ];
  var cards=types.map(function(t,i){
    var tags=t.tags.map(function(tg){return '<span class="bdg bs">'+tg+'</span>';}).join('');
    return '<div class="tc au" style="animation-delay:'+(i*0.07)+'s" data-action="seltype" data-val="'+t.id+'">'+
      '<div class="tci" style="background:'+t.bg+'">'+t.e+'</div>'+
      '<div style="font-size:17px;font-weight:800;margin-bottom:8px;letter-spacing:-.02em">'+t.label+'</div>'+
      '<div style="font-size:13px;color:#64748B;line-height:1.65;margin-bottom:16px">'+t.desc+'</div>'+
      '<div class="fl" style="flex-wrap:wrap;gap:6px">'+tags+'</div>'+
      '<div class="tcb">'+t.e+'</div></div>';
  }).join('');
  return '<div class="sel">'+
    '<div class="fl ac g10 au" style="margin-bottom:44px">'+
      '<div style="width:30px;height:30px;background:#4F46E5;border-radius:8px;display:flex;align-items:center;justify-content:center">'+ic('layers',14,'#fff')+'</div>'+
      '<span style="font-weight:800;font-size:15px">TouchClass</span>'+
      '<span style="color:#CBD5E1;margin:0 6px">—</span>'+
      '<span style="font-size:13px;color:#64748B">새 코스 만들기</span></div>'+
    '<div class="au d1" style="text-align:center">'+
      '<h1 style="font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.03em">어떤 코스를 개설하시겠어요?</h1>'+
      '<p style="font-size:13px;color:#64748B">코스 유형에 따라 최적화된 등록 환경이 자동으로 구성됩니다</p></div>'+
    '<div class="tg">'+cards+'</div>'+
    '<p class="au d3" style="font-size:12px;color:#94A3B8;margin-top:28px">등록 후에도 코스 유형 일부 설정은 변경 가능합니다</p></div>';
}
 
// ── EDITOR ────────────────────────────────────────────────────────────────────
function editorHTML(){
  var lbl={online:'온라인',offline:'오프라인',blended:'블렌디드'}[S.ctype];
  var emj={online:'🎬',offline:'📍',blended:'✨'}[S.ctype];
  var bc=S.ctype==='offline'?'br':'bi';
  var isOff=S.ctype==='offline'||S.ctype==='blended';
  return '<div id="app" class="ai" style="height:100vh;display:flex;flex-direction:column">'+
    hdrHTML(lbl,emj,bc)+
    '<div class="body">'+leftHTML(isOff)+rightHTML()+'</div>'+
    (S.setOpen?setModalHTML():'')+
    (S.libOpen?libModalHTML():'')+
    '</div>';
}
 
function hdrHTML(lbl,emj,bc){
  return '<div class="hdr">'+
    '<button class="btn" data-action="goback" style="background:none;color:#94A3B8;padding:4px">'+ic('x',18)+'</button>'+
    '<div style="width:1px;height:18px;background:#E2E8F0"></div>'+
    '<div class="fl ac g8">'+
      '<span style="font-size:12px;color:#94A3B8">코스 등록</span>'+ic('cr',13,'#CBD5E1')+
      '<span class="bdg '+bc+'" style="font-size:11px">'+emj+' '+lbl+'</span></div>'+
    '<div class="fl ac g4" style="margin-left:auto;margin-right:14px">'+
      '<div class="pdot on"></div><div class="pdot"></div><div class="pdot"></div></div>'+
    '<button class="btn bs2" style="padding:7px 14px;font-size:12px">임시저장</button>'+
    '<button class="btn bp" style="padding:7px 14px;font-size:12px">등록 완료</button></div>';
}
 
// ── LEFT PANEL ────────────────────────────────────────────────────────────────
function leftHTML(isOff){
  var h='<div class="lp"><div class="li">';
  h+=basicCard();
  h+=enrollCard();
  h+=periodCard();
  if(isOff){h+=policyCard();h+=sessionsCard();}
  h+=optionsCard();
  h+='</div></div>';
  return h;
}
 
function tog_el(key){
  return '<button class="tog'+(S.tog[key]?' on':'')+'" data-action="tog" data-key="'+key+'"></button>';
}
function rad(on){return '<span class="rad'+(on?' on':'')+'"></span>';}
function req_btn(isReq){
  return '<button class="rqb '+(isReq?'rqr':'rqo')+'" data-action="reqtog">'+( isReq?'필수':'선택')+'</button>';
}
 
function basicCard(){
  return '<div class="card au d1">'+
    '<div class="ct">코스 기본 정보</div>'+
    '<div class="fl col g14">'+
      '<div class="fl ac g12"><span class="flbl" style="width:68px;margin:0;flex-shrink:0">코스 분류</span>'+
        '<button class="btn bp" style="padding:6px 12px;font-size:12px">'+ic('plus',12,'#fff')+' 분류 선택</button></div>'+
      '<div style="position:relative"><label style="position:absolute;top:-8px;left:12px;background:#fff;padding:0 4px;font-size:11px;font-weight:700;color:#4F46E5;z-index:1">코스명</label>'+
        '<input class="fld" style="border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,.08)" value="2026년 3월 온보딩 코스"></div>'+
      '<div style="position:relative"><label style="position:absolute;top:-8px;left:12px;background:#fff;padding:0 4px;font-size:11px;font-weight:600;color:#94A3B8;z-index:1">코스 소개</label>'+
        '<input class="fld" placeholder="코스에 대한 간단한 소개를 입력하세요"></div>'+
      '<div class="fl ac g16" style="padding-top:12px;border-top:1px solid #F8FAFC">'+
        '<span class="flbl" style="width:68px;margin:0;flex-shrink:0">상단 표시</span>'+
        '<label class="fl ac g8" style="cursor:pointer">'+rad(true)+'<span style="font-size:13px;font-weight:600;color:#334155">기본(표지)</span></label>'+
        '<label class="fl ac g8" style="cursor:pointer">'+rad(false)+'<span style="font-size:13px;color:#64748B">이미지(최대 5장)</span></label>'+

      '<div style="font-size:14px;font-weight:600">회원이 직접 신청</div>'+
      '<div style="font-size:12px;color:#94A3B8;margin-top:2px">'+(S.tog.en1?'사용 중':'수강 목록에서 학습자가 직접 신청합니다')+'</div></div>'+

      '<div style="font-size:12px;color:#94A3B8;margin-top:2px">'+(S.tog.en2?'사용 중':'관리자가 대상자를 지정하여 등록합니다')+'</div></div>'+
      tog_el('en2')+'</div></div>';

      '<label class="fl ac g10" style="cursor:pointer">'+rad(true)+'<span style="font-size:13px;font-weight:600">기간 직접 지정</span></label>'+

        '<input type="datetime-local" class="fld" style="max-width:195px;font-size:12px" value="2026-03-01T09:00">'+

function policyCard(){
  return '<div class="card au">'+
    '<div class="ct"><span class="bdg br">오프라인 특화</span>오프라인 운영 및 출결 정책</div>'+
    '<div class="g2 mb18">'+
      '<div><label class="flbl">담당 강사</label><input class="fld" placeholder="강사명 입력"></div>'+
      '<div><label class="flbl">기본 교육 장소</label><input class="fld" placeholder="예) 본사 2층 제1교육장"></div>'+
    '</div>'+
    '<div class="or"><div class="fl ac g10 f1" style="margin-right:12px">'+
      '<div style="width:30px;height:30px;background:#F1F5F9;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic('qr',13,'#64748B')+'</div>'+
      '<div><div style="font-size:13px;font-weight:600">QR 코드 출석 관리 연동</div>'+
        '<div style="font-size:11px;color:#94A3B8;margin-top:2px">각 회차마다 고유 QR 코드를 발급하여 현장 출석을 실시간으로 연동합니다</div></div></div>'+
      tog_el('qr')+'</div>'+
    '<div class="or"><div class="fl ac g10 f1" style="margin-right:12px">'+
      '<div style="width:30px;height:30px;background:#F1F5F9;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic('chk',13,'#64748B')+'</div>'+
      '<div><div style="font-size:13px;font-weight:600">관리자 수기 출석 처리 허용</div>'+
        '<div style="font-size:11px;color:#94A3B8;margin-top:2px">앱 미설치 등 예외 상황 발생 시 관리자가 직접 출석 처리할 수 있습니다</div></div></div>'+
      tog_el('man')+'</div></div>';
}
 
function sessionsCard(){
  var rules=[
    {id:'single',icon:'①',label:'단일 회차 선택',desc:'여러 일정 중 학습자가 1개만 선택하여 수강합니다'},
    {id:'multiple',icon:'⊞',label:'복수 회차 선택',desc:'지정된 수량만큼 조합하여 선택 수강합니다'},
    {id:'all',icon:'🗓',label:'전체 회차 필수',desc:'모든 회차에 일괄 자동 등록됩니다'}
  ];
  var rcards=rules.map(function(r){
    var a=S.rule===r.id;
    var extra='';
    if(r.id==='multiple'&&a){
      extra='<div class="fl ac g6" style="margin-top:10px;font-size:12px;font-weight:700;color:#4F46E5;background:#fff;border:1px solid #C7D2FE;border-radius:8px;padding:6px 10px">'+
        '필수 수강: <input type="number" value="3" style="width:36px;border:1px solid #E2E8F0;border-radius:6px;padding:2px 4px;text-align:center;outline:none;font-weight:700;font-family:inherit"> 회차</div>';
    }
    return '<div class="rc'+(a?' on':'')+'" data-action="setrule" data-val="'+r.id+'">'+
      '<div style="position:absolute;top:13px;right:13px">'+rad(a)+'</div>'+
      '<div style="width:30px;height:30px;border-radius:8px;background:'+(a?'#4F46E5':'#F1F5F9')+';color:'+(a?'#fff':'#64748B')+';display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:14px;font-weight:800">'+r.icon+'</div>'+
      '<div style="font-size:13px;font-weight:700;color:'+(a?'#4F46E5':'#334155')+';margin-bottom:6px">'+r.label+'</div>'+
      '<div style="font-size:11px;color:#94A3B8;line-height:1.55">'+r.desc+'</div>'+extra+'</div>';
  }).join('');
 
  var content=S.rule==='all'?batchContent():manualContent();
 
  return '<div class="card au">'+
    '<div class="ct"><span class="bdg br">오프라인 핵심</span>수강 신청 방식 및 회차(세션) 구성</div>'+
    '<div class="flbl mb8">학습자 이수 규칙</div>'+
    '<div class="rg">'+rcards+'</div>'+
    content+'</div>';
}
 
function batchContent(){
  var bDone=S.sessions.length>0&&S.sessions[0].id>=200;
  var dBtns=['일','월','화','수','목','금','토'].map(function(d){
    return '<button class="db'+(S.days.indexOf(d)>=0?' on':'')+'" data-action="togday" data-val="'+d+'">'+d+'</button>';
  }).join('');
  var trows='';
  if(bDone){
    trows=S.sessions.map(function(s,i){
      return '<tr>'+
        '<td><span style="font-weight:800;color:#4F46E5;font-size:12px">'+(i+1)+'회차</span></td>'+
        '<td style="font-size:13px;font-weight:500">'+s.date+'</td>'+
        '<td style="font-size:12px;color:#64748B">'+s.st+' – '+s.et+'</td>'+
        '<td style="font-size:12px;color:#94A3B8">기본 장소</td>'+
        '<td style="text-align:center;font-weight:600">'+s.cap+'</td>'+
        '<td style="text-align:center;color:#CBD5E1">—</td></tr>';
    }).join('');
  } else {
    trows='<tr><td colspan="6"><div class="emp" style="border:none;padding:28px 20px">'+
      '<span style="font-size:24px">📅</span>'+
      '<p style="font-size:12px;color:#94A3B8">조건을 설정하고 일괄 생성 버튼을 눌러주세요</p></div></td></tr>';
  }
  return '<div class="ib">'+ic('zap',15,'#4F46E5')+'<p><strong>일괄 생성 모드</strong> — 정기적으로 반복되는 회차 일정을 요일 기반으로 자동 생성합니다</p></div>'+
    '<div style="background:#F8FAFC;border-radius:14px;padding:18px;border:1px solid #E2E8F0;display:flex;flex-direction:column;gap:16px;margin-bottom:16px">'+
      '<div class="g2">'+
        '<div><label class="flbl">진행 기간</label><div class="fl ac g6"><input type="date" class="fld" style="font-size:12px" value="2026-03-01"><span style="color:#94A3B8">—</span><input type="date" class="fld" style="font-size:12px" value="2026-03-31"></div></div>'+
        '<div><label class="flbl">반복 요일</label><div class="dw">'+dBtns+'</div></div>'+
      '</div>'+
      '<div class="g3">'+
        '<div><label class="flbl">공통 시간</label><div class="fl ac g5"><input type="time" class="fld" style="font-size:12px" value="22:00"><span style="color:#94A3B8;font-size:12px">—</span><input type="time" class="fld" style="font-size:12px" value="23:00"></div></div>'+
        '<div><label class="flbl">공통 정원 (명)</label><input type="number" class="fld" value="30"></div>'+
        '<div><label class="flbl">그룹 제한</label><input class="fld" placeholder="제한 없음"></div>'+
      '</div>'+
      '<button class="bbt" data-action="batch">'+ic('wand',15,'#fff')+' 설정한 규칙으로 전체 회차 일괄 생성</button>'+
    '</div>'+
    '<div style="font-size:12px;color:#94A3B8;margin-bottom:8px;font-weight:600">생성된 회차 목록 '+(bDone?'<span style="color:#10B981;margin-left:4px">✓ '+S.sessions.length+'개 생성됨</span>':'')+'</div>'+
    '<div style="border:1px solid #E2E8F0;border-radius:12px;overflow:hidden">'+
      '<table class="stbl"><thead><tr>'+
        '<th style="width:55px">회차</th><th>교육 일자</th><th>교육 시간</th><th>장소</th>'+
        '<th style="text-align:center;width:60px">정원</th><th style="text-align:center;width:65px">그룹</th></tr></thead>'+
      '<tbody>'+trows+'</tbody></table></div>';
}
 
function manualContent(){
  var rows=S.sessions.filter(function(s){return s.id<200;}).map(function(s,i){
    return '<tr>'+
      '<td style="text-align:center;font-weight:800;color:#4F46E5;font-size:13px">'+(i+1)+'</td>'+
      '<td><input type="date" class="fld s-date" data-sid="'+s.id+'" style="padding:7px 9px;font-size:12px" value="'+s.date+'"></td>'+
      '<td><div class="fl ac" style="gap:3px">'+
        '<input type="time" class="fld s-st" data-sid="'+s.id+'" style="padding:7px;font-size:12px;min-width:84px" value="'+s.st+'">'+
        '<span style="color:#94A3B8;font-size:12px">—</span>'+
        '<input type="time" class="fld s-et" data-sid="'+s.id+'" style="padding:7px;font-size:12px;min-width:84px" value="'+s.et+'">'+
      '</div></td>'+
      '<td><input class="fld s-pl" data-sid="'+s.id+'" style="padding:7px 9px;font-size:12px" placeholder="기본 장소" value="'+s.place+'"></td>'+
      '<td style="text-align:center"><input type="number" class="fld s-cp" data-sid="'+s.id+'" style="padding:7px 4px;font-size:12px;text-align:center;width:52px" value="'+s.cap+'"></td>'+
      '<td style="text-align:center"><button style="width:26px;height:26px;border:1px solid #E2E8F0;border-radius:6px;background:#fff;cursor:pointer;font-size:11px;color:#94A3B8;font-family:inherit">—</button></td>'+
      '<td><button class="btn" data-action="remsess" data-sid="'+s.id+'" style="background:none;color:#CBD5E1;padding:4px">'+ic('trash',14)+'</button></td>'+
    '</tr>';
  }).join('');
  var msg=S.rule==='single'?
    '학습자가 선택할 수 있는 일정(선택지)을 하나씩 추가하세요. 학습자는 이 중 단 1개만 선택 가능합니다.':
    '전체 회차 풀을 구성하세요. 학습자는 지정된 수량을 자유롭게 조합하여 선택합니다.';
  return '<div class="ib">'+ic('info',15,'#4F46E5')+'<p>'+msg+'</p></div>'+
    '<div style="border:1px solid #E2E8F0;border-radius:12px;overflow:hidden">'+
      '<table class="stbl"><thead><tr>'+
        '<th style="width:40px;text-align:center">#</th><th>교육 일자</th><th>교육 시간</th><th>장소</th>'+
        '<th style="text-align:center;width:66px">정원</th><th style="text-align:center;width:56px">그룹</th><th style="width:32px"></th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table>'+
      '<button data-action="addsess" style="width:100%;padding:11px;background:#fff;border:none;border-top:1px solid #E2E8F0;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;color:#64748B;cursor:pointer;font-family:inherit;border-radius:0 0 12px 12px">'+ic('plus',13)+' 선택 일정(회차) 추가하기</button>'+
    '</div>';
}
 
function optionsCard(){
  var opts=[
    {k:'mon',label:'자리 비움 모니터링',desc:'장시간 자리 비움 시 학습 일시정지 및 알림을 발송합니다'},
    {k:'unl',label:'커리큘럼별 공개일 설정',desc:'수강 시작 시 모든 커리큘럼 공개 (기본값)'},
    {k:'seq',label:'순서대로 수강하기',desc:'이전 항목 완료 후 다음 항목에 접근 가능합니다'},
    {k:'pre',label:'수강 전 코스 정보 미리보기',desc:'코스 목록에서 상세 정보를 먼저 확인할 수 있습니다'}
  ];
  var rows=opts.map(function(o){
    return '<div class="or"><div>'+
      '<div style="font-size:14px;font-weight:600">'+o.label+'</div>'+
      '<div style="font-size:12px;color:#94A3B8;margin-top:2px">'+o.desc+'</div></div>'+
      tog_el(o.k)+'</div>';
  }).join('');
  return '<div class="card au"><div class="ct">코스 상세 옵션</div>'+rows+'</div>';
}
 
// ── RIGHT PANEL ───────────────────────────────────────────────────────────────
function rightHTML(){
  return '<div class="rp">'+
    (S.ctype==='offline'?offRoadmapHTML():freeRoadmapHTML())+
    '</div>';
}
 
function offRoadmapHTML(){
  var items='';
  if(S.sessions.length>0){
    items=S.sessions.map(function(s,i){
      var lbl=(S.rule==='single'?'선택 옵션 '+(i+1):(i+1)+'회차')+' — 오프라인 교육';
      var sub=s.date?(s.date+' · '+s.st+'–'+s.et):'일정 미입력';
      var isReq=S.rule==='all';
      var cond=isReq?'<div style="margin-top:8px;padding-top:8px;border-top:1px solid #F1F5F9;display:flex;gap:6px;font-size:10px;color:#64748B"><span style="font-weight:700;color:#4F46E5">이수 조건</span><span>출석 처리 완료 시 자동 이수</span></div>':'';
      return '<div class="rmi ng">'+
        '<div class="rmic">'+
          '<div class="fl ac g10">'+
            '<div style="width:30px;height:30px;background:#ECFDF5;color:#059669;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic('map',14)+'</div>'+
            '<div class="f1 mw0"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+lbl+'</div>'+
              '<div style="font-size:10px;color:#94A3B8;margin-top:2px">'+sub+'</div></div>'+
            '<button class="rqb '+(isReq?'rqr':'rqo')+'" data-action="reqtog">'+(isReq?'필수':'선택')+'</button>'+
          '</div>'+cond+'</div></div>';
    }).join('');
  } else {
    items='<div class="emp"><span style="font-size:24px">📅</span><p style="font-size:11px;color:#94A3B8">좌측에서 회차를 추가해주세요</p></div>';
  }
  return '<div class="rmh">'+
      '<div><div style="font-size:13px;font-weight:800">커리큘럼 로드맵</div>'+
        '<div style="font-size:10px;color:#94A3B8;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:1px">Roadmap Index</div></div></div>'+
    '<div class="rmb">'+
      '<div class="ofn">'+

// ─── EVENT DELEGATION ─────────────────────────────────────────────────────────
function bind(){
  document.getElementById('app').addEventListener('click',function(e){
    var el=e.target;
    // walk up to find data-action
    while(el&&el.id!=='app'){
      if(el.dataset&&el.dataset.stop){e.stopPropagation();return;}
      if(el.dataset&&el.dataset.action){
        var a=el.dataset.action;
        if(a==='seltype'){upd({ctype:el.dataset.val,view:'editor'});return;}
        if(a==='goback'){upd({view:'selection',ctype:null,rule:'single',sessions:[{id:1,date:'',st:'',et:'',place:'',cap:30},{id:2,date:'',st:'',et:'',place:'',cap:30}],mods:[]});return;}
        if(a==='tog'){var t2=Object.assign({},S.tog);t2[el.dataset.key]=!t2[el.dataset.key];upd({tog:t2});return;}
        if(a==='setrule'){upd({rule:el.dataset.val});return;}
        if(a==='togday'){var d=el.dataset.val;var arr=S.days.slice();var i=arr.indexOf(d);if(i>=0)arr.splice(i,1);else arr.push(d);upd({days:arr});return;}
        if(a==='batch'){upd({sessions:[{id:201,date:'2026-03-02',st:'22:00',et:'23:00',place:'',cap:30},{id:202,date:'2026-03-04',st:'22:00',et:'23:00',place:'',cap:30},{id:203,date:'2026-03-06',st:'22:00',et:'23:00',place:'',cap:30},{id:204,date:'2026-03-09',st:'22:00',et:'23:00',place:'',cap:30}]});return;}
        if(a==='addsess'){var ss=S.sessions.slice();ss.push({id:Date.now(),date:'',st:'',et:'',place:'',cap:30});upd({sessions:ss});return;}
        if(a==='remsess'){upd({sessions:S.sessions.filter(function(s){return s.id!==parseInt(el.dataset.sid);})});return;}
        if(a==='addmod'){var ms=S.mods.slice();var mn=(S.ctype==='blended'?3:2)+ms.length;ms.push({id:Date.now(),title:'새 챕터 '+mn});upd({mods:ms});return;}
        if(a==='removemod'){upd({mods:S.mods.filter(function(m){return m.id!==parseInt(el.dataset.mid);})});return;}
        if(a==='toblended'){upd({ctype:'blended'});return;}
        if(a==='openlib'){upd({libOpen:true});return;}
        if(a==='closelib'){upd({libOpen:false});return;}
        if(a==='setlibcat'){upd({libCat:el.dataset.val});return;}
        if(a==='opensettings'){upd({setOpen:true,setTitle:el.dataset.title||''});return;}
        if(a==='closeset'){upd({setOpen:false,setTitle:''});return;}
        if(a==='reqtog'){el.classList.toggle('rqr');el.classList.toggle('rqo');el.textContent=el.classList.contains('rqr')?'필수':'선택';return;}
        return;
      }
      el=el.parentElement;
    }
  });
  // session input bindings
  document.querySelectorAll('.s-date,.s-st,.s-et,.s-pl,.s-cp').forEach(function(inp){
    inp.addEventListener('change',function(){
      var sid=parseInt(inp.dataset.sid);
      var key={'.s-date':'date','.s-st':'st','.s-et':'et','.s-pl':'place','.s-cp':'cap'}['.'+inp.className.split(' ').find(function(c){return c.startsWith('s-')})];
      if(!key) return;
      S.sessions=S.sessions.map(function(s){
        if(s.id!==sid) return s;
        var n=Object.assign({},s);
        n[key]=key==='cap'?parseInt(inp.value)||0:inp.value;
        return n;
      });
    });
  });
}
 
render();
</script>

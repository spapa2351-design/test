<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>현재 코스 vs 차세대 코스</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e2d0;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    padding: 24px;
    user-select: none;
  }

  h1 {
    text-align: center;
    font-size: 16px;
    color: #444;
    margin-bottom: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
  }

  .panel {
    flex: 1;
    background: #faf6e8;
    border: 2px solid #2d2d2d;
    border-radius: 0 10px 10px 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    background: #2d2d2d;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    display: inline-block;
    align-self: flex-start;
    border-radius: 0 0 6px 0;
  }

  /* 뷰포트: 스크롤 없음, 넘치는 부분 clip */
  .viewport {
    width: 100%;
    height: 520px;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }

  .viewport.grabbing {
    cursor: grabbing;
  }

  /* 이미지 컨테이너: transform origin center */
  .img-wrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    transform-origin: 0 0;
    will-change: transform;
  }

  .img-wrap img {
    width: 100%;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* 줌 힌트 */
  .hint {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    color: #888;
    background: rgba(255,255,255,0.75);
    padding: 3px 8px;
    border-radius: 10px;
    pointer-events: none;
  }

  /* 줌 버튼 */
  .zoom-btns {
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    background: #f0ece0;
    border-top: 1px solid #ddd;
    justify-content: flex-end;
    align-items: center;
  }

  .zoom-btns span {
    font-size: 10px;
    color: #666;
    margin-right: 4px;
  }

  .zoom-btn {
    width: 28px;
    height: 28px;
    border: 1.5px solid #aaa;
    border-radius: 6px;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    color: #333;
    font-weight: 700;
    line-height: 1;
  }

  .zoom-btn:hover { background: #e0e0e0; }

  .zoom-label {
    font-size: 11px;
    color: #555;
    min-width: 36px;
    text-align: center;
  }
</style>
</head>

      <button class="zoom-btn" onclick="zoomBtn('b', +0.1)">+</button>

<script>
  const panels = {
    a: { scale: 1, tx: 0, ty: 0, dragging: false, startX: 0, startY: 0, startTx: 0, startTy: 0 },
    b: { scale: 1, tx: 0, ty: 0, dragging: false, startX: 0, startY: 0, startTx: 0, startTy: 0 }
  };

  const MIN_SCALE = 0.3;
  const MAX_SCALE = 5;

  function applyTransform(id) {
    const s = panels[id];
    const wrap = document.getElementById('wrap-' + id);
    wrap.style.transform = 'translate(' + s.tx + 'px,' + s.ty + 'px) scale(' + s.scale + ')';
    document.getElementById('zlabel-' + id).textContent = Math.round(s.scale * 100) + '%';
  }

  function clampTranslate(id) {
    const s = panels[id];
    const vp = document.getElementById('vp-' + id);
    const vpW = vp.clientWidth;
    const vpH = vp.clientHeight;
    const wrap = document.getElementById('wrap-' + id);
    const imgW = wrap.clientWidth * s.scale;
    const imgH = wrap.clientHeight * s.scale;

    // 이미지가 뷰포트보다 작으면 중앙 고정, 크면 경계 제한
    if (imgW <= vpW) {
      s.tx = (vpW - imgW) / 2;
    } else {
      s.tx = Math.min(0, Math.max(vpW - imgW, s.tx));
    }
    if (imgH <= vpH) {
      s.ty = (vpH - imgH) / 2;
    } else {
      s.ty = Math.min(0, Math.max(vpH - imgH, s.ty));
    }
  }

  function zoomAt(id, delta, cx, cy) {
    const s = panels[id];
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, s.scale + delta));
    if (newScale === s.scale) return;

    // 마우스 위치 기준으로 줌
    const ratio = newScale / s.scale;
    s.tx = cx - ratio * (cx - s.tx);
    s.ty = cy - ratio * (cy - s.ty);
    s.scale = newScale;
    clampTranslate(id);
    applyTransform(id);
  }

  function zoomBtn(id, delta) {
    const vp = document.getElementById('vp-' + id);
    const cx = vp.clientWidth / 2;
    const cy = vp.clientHeight / 2;
    zoomAt(id, delta, cx, cy);
  }

  function resetZoom(id) {
    panels[id].scale = 1;
    panels[id].tx = 0;
    panels[id].ty = 0;
    applyTransform(id);
  }

  // 각 뷰포트에 이벤트 등록
  ['a', 'b'].forEach(function(id) {
    const vp = document.getElementById('vp-' + id);
    const s = panels[id];

    // 휠 줌
    vp.addEventListener('wheel', function(e) {
      e.preventDefault();
      const rect = vp.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const delta = e.deltaY < 0 ? 0.12 : -0.12;
      zoomAt(id, delta, cx, cy);
    }, { passive: false });

    // 드래그 시작
    vp.addEventListener('mousedown', function(e) {
      s.dragging = true;
      s.startX = e.clientX;
      s.startY = e.clientY;
      s.startTx = s.tx;
      s.startTy = s.ty;
      vp.classList.add('grabbing');
    });

    // 터치 드래그
    vp.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) {
        s.dragging = true;
        s.startX = e.touches[0].clientX;
        s.startY = e.touches[0].clientY;
        s.startTx = s.tx;
        s.startTy = s.ty;
      }
    }, { passive: true });

    vp.addEventListener('touchmove', function(e) {
      if (s.dragging && e.touches.length === 1) {
        s.tx = s.startTx + (e.touches[0].clientX - s.startX);
        s.ty = s.startTy + (e.touches[0].clientY - s.startY);
        clampTranslate(id);
        applyTransform(id);
      }
    }, { passive: true });

    vp.addEventListener('touchend', function() { s.dragging = false; });
  });

  // 글로벌 mousemove / mouseup
  document.addEventListener('mousemove', function(e) {
    ['a', 'b'].forEach(function(id) {
      const s = panels[id];
      if (!s.dragging) return;
      s.tx = s.startTx + (e.clientX - s.startX);
      s.ty = s.startTy + (e.clientY - s.startY);
      clampTranslate(id);
      applyTransform(id);
    });
  });

  document.addEventListener('mouseup', function() {
    ['a', 'b'].forEach(function(id) {
      panels[id].dragging = false;
      document.getElementById('vp-' + id).classList.remove('grabbing');
    });
  });
</script>

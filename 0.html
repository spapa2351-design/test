<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TouchClass</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;color:#0F172A;overflow:hidden}
:root{--b:#4F46E5;--bl:#EEF2FF;--bd:#4338CA;--g:#10B981;--bo:#E2E8F0;--tx:#0F172A;--mu:#64748B;--fa:#94A3B8}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* no fade animations on re-render — only on first load */
.sel-enter{animation:fadeUp .28s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* layout */
#app{height:100vh;display:flex;flex-direction:column}
.hdr{height:56px;background:#fff;border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
.body{flex:1;display:flex;overflow:hidden}
.lp{flex:1;overflow-y:auto;padding:24px 32px;background:#F8FAFC}
.li{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:16px;padding-bottom:80px}
.rp{width:380px;background:#fff;border-left:1px solid var(--bo);display:flex;flex-direction:column;overflow:hidden}

/* card */
.card{background:#fff;border-radius:14px;border:1px solid var(--bo);padding:22px 24px;box-shadow:0 1px 4px rgba(15,23,42,.04)}
.ct{font-size:15px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}

/* badge */
.bdg{display:inline-flex;align-items:center;border-radius:99px;font-size:10px;font-weight:700;padding:2px 8px}
.bi{background:#EEF2FF;color:#4F46E5}.bg{background:#ECFDF5;color:#059669}.br{background:#FEF2F2;color:#DC2626}.bs{background:#F1F5F9;color:#475569}

/* toggle */
.tog{width:40px;height:22px;border-radius:99px;background:#E2E8F0;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;border:none;outline:none}
.tog.on{background:var(--b)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog.on::after{transform:translateX(18px)}

/* radio */
.rad{width:16px;height:16px;border-radius:50%;border:2px solid #CBD5E1;display:inline-block;flex-shrink:0;cursor:pointer;transition:border .15s}
.rad.on{border-color:var(--b);border-width:5px}

/* inputs */
.fld{width:100%;border:1.5px solid var(--bo);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--tx);outline:none;background:#fff;font-family:inherit;transition:border-color .15s}
.fld:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.flbl{font-size:11px;font-weight:700;color:var(--fa);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}

/* buttons */
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:10px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--b);color:#fff;padding:9px 18px;font-size:13px;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.bp:hover{background:var(--bd)}
.bs2{background:#fff;color:var(--mu);padding:9px 18px;font-size:13px;border:1.5px solid var(--bo)!important}
.bs2:hover{border-color:#94A3B8!important;color:var(--tx)}

/* option row */
.or{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #F8FAFC}
.or:last-child{border-bottom:none}

/* rule card */
.rc{border:1.5px solid var(--bo);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.rc.on{border-color:var(--b);background:#F5F7FF;box-shadow:0 0 0 3px rgba(79,70,229,.1)}

/* info box */
.ib{background:#F0F4FF;border:1px solid #C7D2FE;border-radius:12px;padding:13px 15px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;font-size:12px;color:#4F46E5;line-height:1.6;font-weight:500}

/* table */
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:11px;font-weight:600;color:var(--fa);text-transform:uppercase;letter-spacing:.05em;padding:10px 8px;text-align:left;background:#F8FAFC;border-bottom:1px solid var(--bo)}
.stbl td{padding:8px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tbody tr:hover td{background:#FAFBFF}
.bbt{width:100%;padding:13px;background:#0F172A;color:#fff;font-weight:800;font-size:14px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.bbt:hover{background:#1E293B}

/* day */
.db{width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:700;border:1.5px solid var(--bo);background:#fff;color:var(--mu);cursor:pointer;font-family:inherit;transition:all .15s}
.db.on{background:var(--b);color:#fff;border-color:var(--b)}

/* roadmap */
.rmh{padding:14px 18px;border-bottom:1px solid #F1F5F9;background:#FAFBFD;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.rmb{flex:1;overflow-y:auto;padding:18px}
.rmf{padding:13px 16px;border-top:1px solid #F1F5F9;background:#FAFBFD;display:flex;gap:8px;flex-shrink:0}
.rmt{flex:1;padding:9px;background:#fff;border:1.5px solid var(--bo);border-radius:10px;font-size:11px;font-weight:700;color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s}
.rmt:hover{border-color:var(--b);color:var(--b)}

/* chapter */
.rmc{position:relative;margin-bottom:22px}
.rmcl{position:absolute;left:11px;top:28px;bottom:-8px;width:2px;background:linear-gradient(to bottom,#E2E8F0 80%,transparent)}
.rmch{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative;z-index:1}
.rmn{width:24px;height:24px;background:#0F172A;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:800;color:#fff}
.rmis{padding-left:28px;display:flex;flex-direction:column;gap:8px}

/* rm node */
.rmi{position:relative}
.rmi::before{content:'';position:absolute;left:-17px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #CBD5E1;z-index:1}
.rmi.nb::before{border-color:var(--b)}
.rmi.ng::before{border-color:var(--g)}
.rmic{background:#fff;border:1px solid var(--bo);border-radius:12px;padding:11px 13px;transition:border-color .15s,transform .15s;cursor:default;position:relative}
.rmic:hover{border-color:var(--b)}
.rmic.gi{border-color:#A7F3D0;background:#F0FDF9}

/* drag states */
.rmi.dragging .rmic{opacity:.4;border-style:dashed}
.rmi.drag-over .rmic{border-color:var(--b);background:#F5F7FF;transform:translateY(-2px)}
.drag-handle{cursor:grab;color:#CBD5E1;display:flex;align-items:center;flex-shrink:0;padding:2px}
.drag-handle:active{cursor:grabbing}
.drag-handle:hover{color:var(--mu)}

/* req btn */
.rqb{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid;flex-shrink:0;cursor:pointer;font-family:inherit;transition:all .15s}
.rqr{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.rqo{background:#F8FAFC;color:var(--fa);border-color:var(--bo)}

/* del btn on hover */
.rm-del{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#CBD5E1;opacity:0;transition:opacity .15s,color .15s;z-index:2;padding:0}
.rmic:hover .rm-del{opacity:1}
.rm-del:hover{color:var(--r,#EF4444)!important;background:#FEF2F2}

/* condition bar */
.cb{background:#F8FAFC;border:1px solid var(--bo);border-radius:8px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-top:8px}
.cb:hover{border-color:var(--b)}

/* modal */
.ovl{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:24px;z-index:200;animation:fadeIn .2s both}
.mdl{background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(15,23,42,.25);overflow:hidden;animation:fadeUp .28s both}
.mh{padding:17px 22px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;background:#FAFBFD}
.mf{padding:14px 22px;border-top:1px solid #F1F5F9;background:#FAFBFD;display:flex;justify-content:flex-end;gap:8px}
.mb2{padding:22px;overflow-y:auto;max-height:60vh}

/* lib */
.lbm{width:min(820px,92vw);height:560px;display:flex;flex-direction:column}
.lbs{display:flex;flex:1;overflow:hidden}
.lbsd{width:150px;border-right:1px solid #F1F5F9;background:#FAFBFD;padding:12px;flex-shrink:0}
.lbmn{flex:1;display:flex;flex-direction:column;padding:20px;overflow:hidden}
.lbl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.lbc{width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:13px;border:none;cursor:pointer;font-family:inherit;background:transparent;color:var(--mu);font-weight:500;display:block;transition:all .1s}
.lbc.on{background:#EEF2FF;color:#4F46E5;font-weight:700}
.lbi{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--bo);border-radius:12px;cursor:default;transition:all .15s}
.lbi:hover{border-color:var(--b);background:#F5F7FF}
.lib-add-btn{padding:5px 12px;border:1.5px solid var(--bo);border-radius:8px;font-size:12px;font-weight:700;color:var(--mu);background:#fff;cursor:pointer;flex-shrink:0;font-family:inherit;transition:all .15s}
.lib-add-btn:hover{background:var(--b);color:#fff;border-color:var(--b)}

/* selection */
.sel{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:900px;width:100%;margin-top:36px}
.tc{background:#fff;border-radius:20px;border:1.5px solid var(--bo);padding:28px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.tc:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(15,23,42,.1)}
.tci{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:22px}
.tcb{position:absolute;bottom:12px;right:12px;font-size:56px;opacity:.07;line-height:1;pointer-events:none}

/* offline notice */
.ofn{background:#FFF8F8;border:1px solid #FECDD3;border-radius:14px;padding:18px;text-align:center;margin-bottom:18px}

/* empty */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border:1.5px dashed #CBD5E1;border-radius:14px;background:#FAFBFC;text-align:center;gap:8px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.rg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.fl{display:flex}.ac{align-items:center}.sb{justify-content:space-between}.f1{flex:1}.mw0{min-width:0}
.col{flex-direction:column}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g14{gap:14px}.g16{gap:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb14{margin-bottom:14px}.mb18{margin-bottom:18px}
.fw7{font-weight:700}.fw8{font-weight:800}
.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.pdot{width:6px;height:6px;border-radius:50%;background:#CBD5E1}
.pdot.on{width:20px;border-radius:3px;background:var(--b)}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator,
input[type=datetime-local]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
var S = {
  view:'selection', ctype:null, rule:'single',
  days:['월','수','금'],
  sessions:[{id:1,date:'',st:'',et:'',place:'',cap:30},{id:2,date:'',st:'',et:'',place:'',cap:30}],
  mods:[],
  // roadmap items per chapter (key = chapter index string)
  chapItems:{'0':['video-신입사원 환영사 및 비전 공유','doc-사내 핵심가치 가이드북']},
  tog:{en1:false,en2:false,mon:false,unl:false,seq:false,pre:false,qr:true,man:true},
  libOpen:false, libCat:'all', libTargetChap:null,
  setOpen:false, setTitle:''
};

// ─── ICONS ───────────────────────────────────────────────────────────────────
var IC={
  video:'<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>',
  map:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  layers:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  cr:'<polyline points="9 18 15 12 9 6"/>',
  doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>',
  list:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
  chk:'<polyline points="20 6 9 17 4 12"/>',
  cog:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  info:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  qr:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  wand:'<path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h.01"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/>',
  up:'<polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>',
  srch:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  rot:'<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.38"/>',
  grip:'<circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>'
};
function ic(n,sz,col){
  var f=n==='zap'?'currentColor':'none';
  var s='display:inline-block;vertical-align:middle;flex-shrink:0;'+(col?'color:'+col+';':'');
  return '<svg width="'+(sz||16)+'" height="'+(sz||16)+'" viewBox="0 0 24 24" fill="'+f+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="'+s+'">'+(IC[n]||'')+'</svg>';
}

// ─── LIB DATA ─────────────────────────────────────────────────────────────────
var LIB=[
  {id:'lib1',t:'2025년 기업문화 핵심가치 내재화 특강',type:'video',time:'45:20',date:'2026.01.15'},
  {id:'lib2',t:'신규 입사자 시스템 가이드(기본편)',type:'doc',time:'-',date:'2025.11.20'},
  {id:'lib3',t:'직장 내 성희롱 예방 교육 (법정의무)',type:'video',time:'60:00',date:'2025.10.05'},
  {id:'lib4',t:'2025 상반기 임직원 만족도 설문',type:'survey',time:'-',date:'2025.09.12'},
  {id:'lib5',t:'신입사원 OJT 최종 평가',type:'exam',time:'20문항',date:'2026.02.10'},
  {id:'lib6',t:'보안 인식 중간 점검',type:'exam',time:'10문항',date:'2026.01.05'}
];

// ─── DRAG STATE ───────────────────────────────────────────────────────────────
var drag = {el:null, chapIdx:null, itemIdx:null, overEl:null};

// ─── RENDER (full) ────────────────────────────────────────────────────────────
// Only called once on init and on view change (selection↔editor)
// Everything else uses targeted DOM patches
var _rendered = false;

function fullRender(){
  document.getElementById('app').innerHTML = S.view==='selection' ? selHTML() : editorHTML();
  if(S.view==='editor') setupRoadmapDnD();
  _rendered=true;
}

// ─── PARTIAL UPDATES (no full re-render) ─────────────────────────────────────

function patchRoadmap(){
  var el=document.getElementById('roadmap-body');
  if(!el) return;
  el.innerHTML = roadmapBodyHTML();
  setupRoadmapDnD();
}

function patchModals(){
  var el=document.getElementById('modal-layer');
  if(!el) return;
  el.innerHTML = (S.setOpen?setModalHTML():'')+(S.libOpen?libModalHTML():'');
}

function patchLeftSessions(){
  var el=document.getElementById('sessions-content');
  if(!el) return;
  el.innerHTML = S.rule==='all' ? batchContent() : manualContent();
}

function patchLeftRules(){
  var el=document.getElementById('rule-grid');
  if(!el) return;
  el.innerHTML = ruleCardsHTML();
}

function patchToggles(){
  document.querySelectorAll('.tog[data-key]').forEach(function(b){
    b.classList.toggle('on', !!S.tog[b.dataset.key]);
  });
}

function patchDayBtns(){
  document.querySelectorAll('.db[data-day]').forEach(function(b){
    b.classList.toggle('on', S.days.indexOf(b.dataset.day)>=0);
  });
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
function selHTML(){
  var types=[
    {id:'online', e:'🎬',label:'온라인 코스',   bg:'#DBEAFE',desc:'비대면·자기주도 학습 과정을 설계합니다. VOD, 문서, 시험을 자유롭게 조합하세요.',tags:['VOD','문서','시험/퀴즈']},
    {id:'offline',e:'📍',label:'오프라인 코스',  bg:'#FFE4E6',desc:'집합 교육과 출석 관리에 최적화된 플로우입니다. QR 출석 및 회차 관리를 지원합니다.',tags:['회차 관리','QR 출석','수기 처리']},

function setupRoadmapDnD(){
  var rmb=document.getElementById('roadmap-body');
  if(!rmb) return;

  rmb.addEventListener('dragstart',function(e){
    var el=e.target.closest('[draggable=true]');
    if(!el) return;
    drag.el=el;
    drag.chapIdx=el.dataset.chap;
    drag.itemIdx=parseInt(el.dataset.item);
    e.dataTransfer.effectAllowed='move';
    setTimeout(function(){el.classList.add('dragging');},0);
  });

  rmb.addEventListener('dragend',function(){
    if(drag.el) drag.el.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(function(n){n.classList.remove('drag-over');});
    drag={el:null,chapIdx:null,itemIdx:null,overEl:null};
  });

  rmb.addEventListener('dragover',function(e){
    e.preventDefault();
    var target=e.target.closest('[draggable=true]');
    if(!target||target===drag.el) return;
    if(drag.overEl&&drag.overEl!==target) drag.overEl.classList.remove('drag-over');
    target.classList.add('drag-over');
    drag.overEl=target;
    e.dataTransfer.dropEffect='move';
  });

  rmb.addEventListener('dragleave',function(e){
    var related=e.relatedTarget;
    if(drag.overEl&&(!related||!drag.overEl.contains(related))){
      drag.overEl.classList.remove('drag-over');
      drag.overEl=null;
    }
  });

  rmb.addEventListener('drop',function(e){
    e.preventDefault();
    if(!drag.el||!drag.overEl) return;
    var fromChap=drag.chapIdx;
    var fromIdx=drag.itemIdx;
    var toChap=drag.overEl.dataset.chap;
    var toIdx=parseInt(drag.overEl.dataset.item);
    if(fromChap===toChap&&fromIdx!==toIdx){
      var arr=(S.chapItems[fromChap]||[]).slice();
      var item=arr.splice(fromIdx,1)[0];
      arr.splice(toIdx,0,item);
      S.chapItems[fromChap]=arr;
      patchRoadmap();
    }
  });
}

// ─── SINGLE EVENT LISTENER (bound once) ──────────────────────────────────────
document.getElementById('app').addEventListener('click',function(e){
  // Find closest element with data-action
  var el=e.target;
  while(el&&el.id!=='app'){
    // Modal content - don't close on click inside
    if(el.dataset&&el.dataset.modal){
      // Only propagate to specific action buttons inside modal
      var a2=e.target.closest('[data-action]');
      if(!a2) return;
      var act2=a2.dataset.action;
      if(act2==='closeset'||act2==='closelib'||act2==='setlibcat'||act2==='libadd'||act2==='inlinetog'||act2==='reqtog'){
        break; // let it fall through to handler below
      }
      return;
    }
    el=el.parentElement;
  }

  var target=e.target.closest('[data-action]');
  if(!target) return;
  var a=target.dataset.action;

  if(a==='seltype'){
    S.ctype=target.dataset.val; S.view='editor';
    fullRender(); return;
  }
  if(a==='goback'){
    S.view='selection'; S.ctype=null; S.rule='single';
    S.sessions=[{id:1,date:'',st:'',et:'',place:'',cap:30},{id:2,date:'',st:'',et:'',place:'',cap:30}];
    S.mods=[]; S.chapItems={'0':['video-신입사원 환영사 및 비전 공유','doc-사내 핵심가치 가이드북']};
    fullRender(); return;
  }
  if(a==='tog'){
    var k=target.dataset.key;
    S.tog[k]=!S.tog[k];
    target.classList.toggle('on'); return;
  }
  if(a==='inlinetog'){
    target.classList.toggle('on'); return;
  }
  if(a==='reqtog'){
    target.classList.toggle('rqr'); target.classList.toggle('rqo');
    target.textContent=target.classList.contains('rqr')?'필수':'선택'; return;
  }
  if(a==='setrule'){
    S.rule=target.dataset.val;
    var rg=document.getElementById('rule-grid');
    if(rg) rg.innerHTML=ruleCardsHTML();
    var sc=document.getElementById('sessions-content');
    if(sc) sc.innerHTML=S.rule==='all'?batchContent():manualContent();
    return;
  }
  if(a==='togday'){
    var d=target.dataset.day;
    var idx=S.days.indexOf(d);
    if(idx>=0) S.days.splice(idx,1); else S.days.push(d);
    target.classList.toggle('on'); return;
  }
  if(a==='batch'){
    S.sessions=[{id:201,date:'2026-03-02',st:'22:00',et:'23:00',place:'',cap:30},{id:202,date:'2026-03-04',st:'22:00',et:'23:00',place:'',cap:30},{id:203,date:'2026-03-06',st:'22:00',et:'23:00',place:'',cap:30},{id:204,date:'2026-03-09',st:'22:00',et:'23:00',place:'',cap:30}];
    var sc2=document.getElementById('sessions-content');
    if(sc2) sc2.innerHTML=batchContent();
    patchRoadmap(); return;
  }
  if(a==='addsess'){
    S.sessions.push({id:Date.now(),date:'',st:'',et:'',place:'',cap:30});
    var sc3=document.getElementById('sessions-content');
    if(sc3) sc3.innerHTML=manualContent();
    patchRoadmap(); return;
  }
  if(a==='remsess'){
    var sid=parseInt(target.dataset.sid);
    S.sessions=S.sessions.filter(function(s){return s.id!==sid;});
    var sc4=document.getElementById('sessions-content');
    if(sc4) sc4.innerHTML=S.rule==='all'?batchContent():manualContent();
    patchRoadmap(); return;
  }
  if(a==='addmod'){
    var chN2=(S.ctype==='blended'?3:2)+S.mods.length;
    var newId=Date.now();
    S.mods.push({id:newId,title:'새 챕터 '+chN2});
    S.chapItems['c'+newId]=[];
    patchRoadmap(); return;
  }
  if(a==='removemod'){
    var mid=parseInt(target.dataset.mid);
    S.mods=S.mods.filter(function(m){return m.id!==mid;});
    delete S.chapItems['c'+mid];
    patchRoadmap(); return;
  }
  if(a==='rmitem'){
    var ci=target.dataset.chap;
    var ii=parseInt(target.dataset.item);
    if(S.chapItems[ci]){
      S.chapItems[ci].splice(ii,1);
      patchRoadmap();
    } return;
  }
  if(a==='toblended'){
    S.ctype='blended'; fullRender(); return;
  }
  if(a==='openlib'){
    S.libOpen=true; S.libTargetChap=target.dataset.chap||'0';
    patchModals(); return;
  }
  if(a==='closelib'){
    S.libOpen=false; S.libTargetChap=null;
    patchModals(); return;
  }
  if(a==='closeset'){
    S.setOpen=false; S.setTitle='';
    patchModals(); return;
  }
  if(a==='setlibcat'){
    S.libCat=target.dataset.val;
    // Only update sidebar active state and list — no full modal re-render
    var sidebar=document.getElementById('lib-sidebar');
    if(sidebar){
      sidebar.querySelectorAll('.lbc').forEach(function(b){
        b.classList.toggle('on', b.dataset.val===S.libCat);
      });
    }
    var listEl=document.getElementById('lib-list');
    if(listEl){
      var filtered2=S.libCat==='all'?LIB:LIB.filter(function(i){return i.type===S.libCat;});
      listEl.innerHTML=filtered2.length===0
        ?'<div class="emp">'+ic('info',26,'#CBD5E1')+'<p style="font-size:13px;color:#94A3B8">해당 카테고리에 등록된 항목이 없습니다</p></div>'
        :filtered2.map(function(item){
          var bg={video:'#DBEAFE',doc:'#F1F5F9',exam:'#EDE9FE',survey:'#FAE8FF'}[item.type]||'#F1F5F9';
          var col={video:'#2563EB',doc:'#64748B',exam:'#7C3AED',survey:'#9333EA'}[item.type]||'#64748B';
          var icn={video:'video',doc:'doc',exam:'list',survey:'list'}[item.type]||'doc';
          return '<div class="lbi">'
            +'<div style="width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:'+bg+';color:'+col+'">'+ic(icn,17)+'</div>'
            +'<div class="f1 mw0"><div style="font-size:13px;font-weight:700">'+item.t+'</div>'
              +'<div class="fl g10" style="font-size:11px;color:#94A3B8;margin-top:3px">'
                +'<span style="text-transform:uppercase">'+item.type+'</span><span>'+item.time+'</span><span>'+item.date+'</span></div></div>'
            +'<button class="lib-add-btn" data-action="libadd" data-libid="'+item.id+'">추가</button>'
          +'</div>';
        }).join('');
    }
    return;
  }
  if(a==='libadd'){
    // Add selected lib item to target chapter
    var libid=target.dataset.libid;
    var libItem=null;
    for(var li=0;li<LIB.length;li++){if(LIB[li].id===libid){libItem=LIB[li];break;}}
    if(!libItem) return;
    var chap=S.libTargetChap||'0';
    if(!S.chapItems[chap]) S.chapItems[chap]=[];
    S.chapItems[chap].push(libItem.type+'-'+libItem.t);
    // Visual feedback on button
    target.textContent='✓ 추가됨';
    target.style.background='#ECFDF5'; target.style.color='#059669'; target.style.borderColor='#A7F3D0';
    target.disabled=true;
    patchRoadmap(); return;
  }
  if(a==='opensettings'){
    S.setOpen=true; S.setTitle=target.dataset.title||'';
    patchModals(); return;
  }
});

// Session field changes (delegated, no re-render)
document.getElementById('app').addEventListener('change',function(e){
  var inp=e.target.closest('.sess-f');
  if(!inp) return;
  var sid=parseInt(inp.dataset.sid);
  var fld=inp.dataset.fld;
  S.sessions=S.sessions.map(function(s){
    if(s.id!==sid) return s;
    var n=Object.assign({},s);
    n[fld]=fld==='cap'?parseInt(inp.value)||0:inp.value;
    return n;
  });
  patchRoadmap();
});

// Mod title change
document.getElementById('app').addEventListener('input',function(e){
  var inp=e.target.closest('[data-action=modtitle]');
  if(!inp) return;
  var mid=parseInt(inp.dataset.mid);
  S.mods=S.mods.map(function(m){return m.id===mid?Object.assign({},m,{title:inp.value}):m;});
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
fullRender();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TouchClass</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;color:#0F172A;overflow:hidden;}
:root{--b:#4F46E5;--bl:#EEF2FF;--bd:#4338CA;--g:#10B981;--r:#EF4444;--bo:#E2E8F0;--bg:#F8FAFC;--tx:#0F172A;--mu:#64748B;--fa:#94A3B8;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,.15)}50%{box-shadow:0 0 0 6px rgba(79,70,229,.05)}}
@keyframes slideDown{from{opacity:0;max-height:0;padding-top:0;padding-bottom:0}to{opacity:1;max-height:500px}}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.au{animation:fadeUp .28s both}.ai{animation:fadeIn .2s both}
.d1{animation-delay:.06s}.d2{animation-delay:.1s}.d3{animation-delay:.16s}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

#app{height:100vh;display:flex;flex-direction:column}
.hdr{height:56px;background:#fff;border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
.body{flex:1;display:flex;overflow:hidden}
.lp{flex:1;overflow-y:auto;padding:0 32px;background:var(--bg)}
.li{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:16px;padding-bottom:80px;padding-top:20px}
.rp{width:380px;min-width:280px;max-width:600px;background:#fff;border-left:1px solid var(--bo);display:flex;flex-direction:column;overflow:hidden;position:relative;flex-shrink:0}
.rp-resizer{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:20;background:transparent;transition:background .15s}
.rp-resizer:hover,.rp-resizer.dragging{background:rgba(79,70,229,.18)}

.card{background:#fff;border-radius:14px;border:1px solid var(--bo);padding:22px 24px;box-shadow:0 1px 4px rgba(15,23,42,.04)}
.ct{font-size:15px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}

.bdg{display:inline-flex;align-items:center;border-radius:99px;font-size:10px;font-weight:700;padding:2px 8px}
.bi{background:#EEF2FF;color:#4F46E5}.bg{background:#ECFDF5;color:#059669}.br{background:#FEF2F2;color:#DC2626}.bs{background:#F1F5F9;color:#475569}

.tog{width:40px;height:22px;border-radius:99px;background:#E2E8F0;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;border:none;outline:none}
.tog.on{background:var(--b)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog.on::after{transform:translateX(18px)}

.rad{width:16px;height:16px;border-radius:50%;border:2px solid #CBD5E1;display:inline-block;flex-shrink:0;cursor:pointer;transition:all .2s ease}
.rad.on{border-color:var(--b);border-width:5px}

.fld{width:100%;border:1.5px solid var(--bo);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--tx);outline:none;background:#fff;font-family:inherit;transition:border-color .15s}
.fld:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.flbl{font-size:11px;font-weight:700;color:var(--fa);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}

.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:10px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--b);color:#fff;padding:9px 18px;font-size:13px;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.bp:hover{background:var(--bd)}
.bs2{background:#fff;color:var(--mu);padding:9px 18px;font-size:13px;border:1.5px solid var(--bo)!important}
.bs2:hover{border-color:#94A3B8!important;color:var(--tx)}

.or{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #F8FAFC}
.or:last-child{border-bottom:none}

/* ── RULE CARDS — flicker-free transitions ── */
.rc{border:1.5px solid var(--bo);border-radius:14px;padding:16px;cursor:pointer;position:relative;
  transition:border-color .25s ease, background .25s ease, box-shadow .25s ease}
.rc.on{border-color:var(--b);background:#F5F7FF;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.rc .rc-icon{transition:background .25s ease, color .25s ease}
.rc .rc-label{transition:color .25s ease}
.rc .rad{transition:all .2s ease}

/* sub-content panel — smooth expand/collapse */
.rc-sub{
  overflow:hidden;
  max-height:0;opacity:0;margin-top:0;
  transition:max-height .3s ease, opacity .25s ease, margin-top .25s ease;
}
.rc.on .rc-sub{
  max-height:80px;opacity:1;margin-top:10px;
}

.ib{background:#F0F4FF;border:1px solid #C7D2FE;border-radius:12px;padding:13px 15px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;font-size:12px;color:#4F46E5;line-height:1.6;font-weight:500;
  transition:all .3s ease;}

.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:11px;font-weight:600;color:var(--fa);text-transform:uppercase;letter-spacing:.05em;padding:10px 8px;text-align:left;background:#F8FAFC;border-bottom:1px solid var(--bo)}
.stbl td{padding:8px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tbody tr:hover td{background:#FAFBFF}

.bbt{width:100%;padding:13px;background:#0F172A;color:#fff;font-weight:800;font-size:14px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:all .2s}
.bbt:hover{background:#1E293B;transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,23,42,.2)}

.dw{display:flex;gap:5px}
.db{width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:700;border:1.5px solid var(--bo);background:#fff;color:var(--mu);cursor:pointer;font-family:inherit;transition:all .15s}
.db.on{background:var(--b);color:#fff;border-color:var(--b)}

.rmh{padding:14px 18px;border-bottom:1px solid #F1F5F9;background:#FAFBFD;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.rmb{flex:1;overflow-y:auto;padding:18px}
.rmf{padding:13px 16px;border-top:1px solid #F1F5F9;background:#FAFBFD;display:flex;gap:8px;flex-shrink:0}
.rmt{flex:1;padding:9px;background:#fff;border:1.5px solid var(--bo);border-radius:10px;font-size:11px;font-weight:700;color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s}
.rmt:hover{border-color:var(--b);color:var(--b)}
.rmc{position:relative;margin-bottom:22px}
.rmcl{position:absolute;left:11px;top:28px;bottom:-8px;width:2px;background:linear-gradient(to bottom,#E2E8F0 80%,transparent)}
.rmch{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative;z-index:1}
.rmn{width:24px;height:24px;background:#0F172A;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:800;color:#fff}
.rmis{padding-left:28px;display:flex;flex-direction:column;gap:8px}
.rmi{position:relative}
.rmi::before{content:'';position:absolute;left:-17px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #CBD5E1;z-index:1}
.rmi.nb::before{border-color:var(--b)}
.rmi.ng::before{border-color:var(--g)}
.rmic{background:#fff;border:1px solid var(--bo);border-radius:12px;padding:11px 13px;transition:all .15s;cursor:pointer}
.rmic:hover{border-color:var(--b);transform:translateX(2px)}
.rmic.gi{border-color:#A7F3D0;background:#F0FDF9}
.rqb{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid;flex-shrink:0;cursor:pointer;font-family:inherit;transition:all .15s}
.rqr{background:#EEF2FF;color:#4F46E5;border-color:#C7D2FE}
.rqo{background:#F8FAFC;color:var(--fa);border-color:var(--bo)}
.cb{background:#F8FAFC;border:1px solid var(--bo);border-radius:8px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-top:8px}
.cb:hover{border-color:var(--b)}

.ovl{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:24px;z-index:200}
.mdl{background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(15,23,42,.25);overflow:hidden;animation:fadeUp .28s both}
.mh{padding:17px 22px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;background:#FAFBFD}
.mf{padding:14px 22px;border-top:1px solid #F1F5F9;background:#FAFBFD;display:flex;justify-content:flex-end;gap:8px}
.mb{padding:22px;overflow-y:auto;max-height:56vh}

.lbm{width:min(820px,92vw);height:560px;display:flex;flex-direction:column}
.lbs{display:flex;flex:1;overflow:hidden}
.lbsd{width:150px;border-right:1px solid #F1F5F9;background:#FAFBFD;padding:12px;flex-shrink:0}
.lbmn{flex:1;display:flex;flex-direction:column;padding:20px;overflow:hidden}
.lbl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.lbc{width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:13px;border:none;cursor:pointer;font-family:inherit;background:transparent;color:var(--mu);font-weight:500;display:block}
.lbc.on{background:#EEF2FF;color:#4F46E5;font-weight:700}
.lbi{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--bo);border-radius:12px;cursor:pointer;transition:all .15s}
.lbi:hover{border-color:var(--b);background:#F5F7FF}

.sel{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:900px;width:100%;margin-top:36px}
.tc{background:#fff;border-radius:20px;border:1.5px solid var(--bo);padding:28px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.tc:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(15,23,42,.1)}
.tci{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:22px}
.tcb{position:absolute;bottom:12px;right:12px;font-size:56px;opacity:.07;line-height:1;pointer-events:none}

.ofn{background:#FFF8F8;border:1px solid #FECDD3;border-radius:14px;padding:18px;text-align:center;margin-bottom:18px}
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border:1.5px dashed #CBD5E1;border-radius:14px;background:#FAFBFC;text-align:center;gap:8px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.rg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}

.fl{display:flex}.ac{align-items:center}.sb{justify-content:space-between}.f1{flex:1}.mw0{min-width:0}
.col{flex-direction:column}
.g4{gap:4px}.g5{gap:5px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g14{gap:14px}.g16{gap:16px}.g18{gap:18px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb18{margin-bottom:18px}
.pt12{padding-top:12px}.bt{border-top:1px solid #F1F5F9}.bb{border-bottom:1px solid #F8FAFC}
.fw7{font-weight:700}.fw8{font-weight:800}
.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.cm{color:var(--mu)}.cf{color:var(--fa)}.cb2{color:var(--b)}
.uc{text-transform:uppercase;letter-spacing:.05em}
.tr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdot{width:6px;height:6px;border-radius:50%;background:#CBD5E1}
.pdot.on{width:20px;border-radius:3px;background:var(--b)}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator,
input[type=datetime-local]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5}

/* ── NEW: Quick Stats Bar ── */
.qstats-wrap{position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 32px 14px;margin:0 -32px;border-bottom:1px solid var(--bo);}
.qstats{display:flex;gap:10px;max-width:760px;margin:0 auto;}
.qstat{flex:1;background:#fff;border:1px solid var(--bo);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;transition:all .2s}
.qstat:hover{border-color:var(--b);box-shadow:0 2px 8px rgba(79,70,229,.06)}
.qstat-val{font-size:17px;font-weight:600;color:var(--tx);line-height:1}
.qstat-label{font-size:10px;font-weight:600;color:var(--fa);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
.qstat-icon{position:absolute;top:10px;right:10px;opacity:.12;font-size:18px}

/* ── NEW: Roadmap Enhance ── */
.rm-progress{height:3px;background:#E2E8F0;border-radius:3px;margin-top:12px;overflow:hidden}
.rm-progress-bar{height:100%;background:linear-gradient(90deg,var(--b),var(--g));border-radius:3px;transition:width .6s ease}
.rm-completion{display:flex;align-items:center;gap:6px;padding:10px 14px;background:linear-gradient(135deg,#F0FDF9,#ECFDF5);border:1px solid #A7F3D0;border-radius:10px;margin-top:10px;font-size:11px;font-weight:700;color:#065F46}

/* ── NEW: Tooltip ── */
.tip{position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) scale(.9);background:#0F172A;color:#fff;font-size:10px;font-weight:600;padding:5px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .15s}
.tip:hover::after{opacity:1;transform:translateX(-50%) scale(1)}

/* ── NEW: Drag hint on roadmap items ── */
.rmic .drag-handle{opacity:0;transition:opacity .15s;color:#CBD5E1;margin-right:4px}
.rmic:hover .drag-handle{opacity:1}

/* ── Drag & Drop ── */
.dz-item{transition:opacity .15s, transform .15s, box-shadow .15s}
.dz-item.dragging{opacity:.3;transform:scale(.97) rotate(-1deg);box-shadow:none!important;pointer-events:none}
.dz-chapter{transition:all .2s}
.dz-chapter-handle{user-select:none}
.rmis{min-height:40px;border-radius:10px;transition:background .2s, box-shadow .2s}

/* 드래그 중 empty state 숨김 */
body.is-dragging .dz-empty{display:none!important}
body.is-dragging .rmis{pointer-events:all!important}

/* 플레이스홀더 — 아이템 사이 삽입 위치 표시 */
.dz-placeholder{
  height:44px;
  border:2px dashed #4F46E5;
  border-radius:12px;
  background:#EEF2FF;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:11px;
  font-weight:700;
  color:#4F46E5;
  margin-bottom:6px;
  animation:dzPulse .55s ease infinite alternate;
  pointer-events:none;
  flex-shrink:0;
}
@keyframes dzPulse{
  from{background:#EEF2FF;border-color:#818CF8;opacity:.85;}
  to{background:#E0E7FF;border-color:#4F46E5;opacity:1;}
}

/* 챕터 전체 소속 변경 하이라이트 */
.dz-chapter-over{
  border-radius:14px;
  box-shadow:0 0 0 2.5px #4F46E5, 0 4px 20px rgba(79,70,229,.18) !important;
  background:#F5F7FF !important;
  transition:box-shadow .15s, background .15s;
}
.dz-chapter-over .rmch{
  background:#EEF2FF !important;
  border-radius:10px 10px 0 0;
}
.dz-chapter-over .rmis{
  background:transparent !important;
}
/* 소속 변경 레이블 */
.dz-chapter-over::after{
  content:'이 커리큘럼으로 이동';
  position:absolute;
  top:8px;right:12px;
  font-size:10px;font-weight:800;
  color:#4F46E5;
  background:#EEF2FF;
  border:1px solid #C7D2FE;
  border-radius:99px;
  padding:3px 10px;
  pointer-events:none;
  animation:dzPulse .55s ease infinite alternate;
}
.dz-chapter{position:relative;}

/* 챕터 재정렬 하이라이트 */
.dz-chapter-reorder-over .rmch{
  outline:2px solid #4F46E5;
  border-radius:10px;
  background:#EEF2FF !important;
}


/* ── Viewer Modal ── */
.viewer-wrap{display:flex;height:100%;overflow:hidden;flex-direction:row}
.viewer-sidebar{width:260px;background:#F8FAFC;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;order:2;border-left:1px solid #E2E8F0}
.viewer-main{flex:1;background:#fff;display:flex;flex-direction:column;overflow:hidden;order:1}
.viewer-chapter{border-bottom:1px solid #F1F5F9}
.viewer-chapter-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;background:#F8FAFC}
.viewer-chapter-hdr:hover{background:#EEF2FF}
.viewer-item{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 34px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.viewer-item:hover{background:#F5F7FF}
.viewer-item.active{background:#EEF2FF;border-left:3px solid #4F46E5 !important}
@keyframes vidPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Calendar ── */
.cal-day{transition:transform .12s ease,box-shadow .12s ease}
.cal-day-has{position:relative}
.cal-day-has:hover{transform:scale(1.18);box-shadow:0 4px 12px rgba(79,70,229,.45)!important;z-index:10}
.cal-day-has::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 7px);
  left:50%;
  transform:translateX(-50%);
  background:#0F172A;
  color:#fff;
  font-size:10px;
  font-weight:600;
  padding:6px 10px;
  border-radius:8px;
  white-space:pre;
  line-height:1.6;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s ease;
  z-index:100;
  box-shadow:0 4px 16px rgba(15,23,42,.25);
  min-width:120px;
  text-align:left;
}
.cal-day-has::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 1px);
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#0F172A;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s ease;
  z-index:100;
}
.cal-day-has:hover::after,.cal-day-has:hover::before{opacity:1}

/* ── NEW: Tag input styling ── */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-item{display:inline-flex;align-items:center;gap:4px;background:#F1F5F9;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:#475569}
.tag-item .tag-x{cursor:pointer;color:#94A3B8;font-size:13px;line-height:1}
.tag-item .tag-x:hover{color:#EF4444}
</style>
</head>
<body>
<div id="app"></div>


<script>

// ─── STATE ───────────────────────────────────────────────────────────────────
var S = {
  view:'selection', ctype:null, rule:'single',
  days:['월','수','금'],
  sessions:[],
  mods:[], tog:{en1:false,en2:false,mon:false,unl:false,seq:false,pre:false,qr:true,man:true},
  libOpen:false, libCat:'all', setOpen:false, setTitle:'', setType:'', setLoc:'',
  tags:['신입사원','2026년 3월','온보딩'],
  batchPlace:'',
  previewOpen:false,
  offItems:[], _libTargetChId:'ch-0', attendanceOpen:false, attendanceSid:null, quickUploadOpen:false, quickUploadFiles:[], quickUploadMode:null, expandedSid:null, viewerOpen:false, viewerPage:0,
  rmItems:[]
};

// ─── TARGETED UPDATE for rule changes (flicker fix) ──────────────────────────
var _lastRule = null;
var _fullRender = true;

function upd(patch){
  var keys = Object.keys(patch);

  // 패치 종류 분류
  var ruleOnly  = patch.rule     && keys.length === 1;
  var sessOnly  = patch.sessions && keys.length === 1;
  var modsOnly  = patch.mods     && keys.length === 1;
  var daysOnly  = patch.days     && keys.length === 1;
  var togOnly   = patch.tog      && (keys.length === 1 || (keys.length === 2 && patch._togKey !== undefined));

  Object.assign(S, patch);

  if(S.view === 'editor' && !_fullRender){

    // ── rule 변경 ──────────────────────────────────────────────────────
    if(ruleOnly){
      updateRuleCards();
      updateInfoBox();
      updateRoadmapRuleState();
      return;
    }

    // ── sessions 변경 (addsess / remsess / batch) ───────────────────────
    if(sessOnly){
      updateSessionContent();
      updateRoadmapSessions();
      return;
    }

    // ── mods 변경 (addmod / removemod) ─────────────────────────────────
    if(modsOnly){
      updateModsContent();
      // 우측 챕터 수 스탯 갱신
      var cs = getCurriculumStats();
      var chEl = document.getElementById('qs-ch-count');
      if(chEl) chEl.textContent = cs.chCount;
      return;
    }

    // ── days 변경 (togday) — 요일 버튼만 갱신 ──────────────────────────
    if(daysOnly){
      var dayBtns = document.querySelectorAll('.db[data-action="togday"]');
      dayBtns.forEach(function(btn){
        if(S.days.indexOf(btn.dataset.val) >= 0) btn.classList.add('on');
        else btn.classList.remove('on');
      });
      return;
    }

    // ── toggle 변경 ────────────────────────────────────────────────────
    if(togOnly){
      var changedKey = patch._togKey;
      if(changedKey) updateTog(changedKey);
      else Object.keys(S.tog).forEach(function(k){ updateTog(k); });
      return;
    }

    // ── ctype 변경 (toblended) — 우측 패널만 갱신 ─────────────────────
    if(keys.length === 1 && patch.ctype !== undefined){
      refreshRoadmap();
      return;
    }

    // ── tags 변경만 — 태그 영역만 갱신 ────────────────────────────────
    if(keys.length === 0){
      updateTagList();
      return;
    }
  }

  _fullRender = false;
  render();
}

function updateRuleCards(){
  var rules = ['single','multiple','all'];
  rules.forEach(function(rid){
    var el = document.querySelector('.rc[data-val="'+rid+'"]');
    if(!el) return;
    var isOn = S.rule === rid;
    if(isOn) el.classList.add('on'); else el.classList.remove('on');
    var radEl = el.querySelector('.rad');
    if(radEl){if(isOn) radEl.classList.add('on'); else radEl.classList.remove('on');}
    var iconEl = el.querySelector('.rc-icon');
    if(iconEl){
      iconEl.style.background = isOn ? '#4F46E5' : '#F1F5F9';
      iconEl.style.color = isOn ? '#fff' : '#64748B';
    }
    var labelEl = el.querySelector('.rc-label');
    if(labelEl) labelEl.style.color = isOn ? '#4F46E5' : '#334155';
  });
  // update content area
  var contentArea = document.getElementById('session-content');
  if(contentArea){
    contentArea.style.opacity = '0';
    contentArea.style.transform = 'translateY(4px)';
    setTimeout(function(){
      contentArea.innerHTML = S.rule === 'all' ? batchContent() : manualContent();
      contentArea.style.transition = 'opacity .25s ease, transform .25s ease';
      contentArea.style.opacity = '1';
      contentArea.style.transform = 'none';
      bindSessionInputs();
    }, 80);
  }
}

function offlineStatsBar(){
  var ds = S.sessions;
  var filled = ds.filter(function(s){return s.date;}).length;
  var totalItems = 0;
  ds.forEach(function(s){
    totalItems += (s.preItems||[]).length + 1 + (s.postItems||[]).length;
  });
  var typeLabel = '오프라인';
  var completeness = 0;
  if(ds.length>0) completeness+=34;
  if(filled>0) completeness+=33;
  if(S.tog.en1||S.tog.en2) completeness+=33;

  return '<div class="qstats au">'
    +'<div class="qstat"><div class="qstat-val">'+typeLabel+'</div><div class="qstat-label">코스 유형</div><div class="qstat-icon">📍</div></div>'
    +'<div class="qstat"><div id="qs-session-count" class="qstat-val">'+ds.length+'</div><div class="qstat-label">전체 회차</div><div class="qstat-icon">📅</div></div>'
    +'<div class="qstat"><div class="qstat-val">'+filled+'</div><div class="qstat-label">일정 확정</div><div class="qstat-icon">✅</div></div>'
    +'<div class="qstat"><div class="qstat-val">'+completeness+'%</div><div class="qstat-label">완성도</div><div class="qstat-icon">📊</div></div>'
  +'</div>';
}

function getCurriculumStats(){
  // 총 커리큘럼(챕터) 수: ch-0 + mods
  var chCount = 1 + S.mods.length;
  // 총 항목(페이지) 수: rmItems + mods items
  var itemCount = S.rmItems.length;
  S.mods.forEach(function(m){ itemCount += (m.items||[]).length; });
  return {chCount: chCount, itemCount: itemCount};
}

function quickStatsBar(){
  var ds = getDisplaySessions();
  var sessCount = ds.length;
  var filledDates = ds.filter(function(s){return s.date;}).length;
  var typeLabel = {online:'온라인',offline:'오프라인',blended:'블렌디드'}[S.ctype] || '';
  var completeness = 0;
  if(S.ctype) completeness += 25;
  if(sessCount > 0) completeness += 25;

function buildCalendarHTML(){
  var ds = getDisplaySessions();
  // 회차가 있는 날짜 맵: 'YYYY-MM-DD' -> [{idx, session}]
  var dateMap = {};
  ds.forEach(function(s, i){
    if(s.date){
      if(!dateMap[s.date]) dateMap[s.date] = [];
      dateMap[s.date].push({idx:i, s:s});
    }
  });

  // 표시할 연/월 결정: 회차 날짜 중 가장 이른 달 or 오늘
  var refDate = new Date();
  var allDates = Object.keys(dateMap).sort();
  if(allDates.length > 0) refDate = new Date(allDates[0]);

  var calYear  = refDate.getFullYear();
  var calMonth = refDate.getMonth(); // 0-based

  // 해당 월의 첫날 / 마지막날
  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay  = new Date(calYear, calMonth+1, 0);
  var startDow = firstDay.getDay(); // 0=일

  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var dayNames   = ['일','월','화','수','목','금','토'];

  var dayHeaders = dayNames.map(function(d,i){
    var col = i===0?'#EF4444':i===6?'#3B82F6':'#64748B';
    return '<div style="text-align:center;font-size:10px;font-weight:700;color:'+col+';padding:4px 0">'+d+'</div>';
  }).join('');

  // 빈 셀 앞채우기
  var cells = '';
  for(var e=0;e<startDow;e++){
    cells += '<div></div>';
  }

  for(var d=1; d<=lastDay.getDate(); d++){
    var mm = String(calMonth+1).padStart(2,'0');
    var dd = String(d).padStart(2,'0');
    var dateKey = calYear+'-'+mm+'-'+dd;
    var hasSess = dateMap[dateKey];
    var dow = new Date(calYear, calMonth, d).getDay();
    var isWeekend = dow===0||dow===6;
    var txtCol = hasSess ? '#fff' : (isWeekend?(dow===0?'#EF4444':'#3B82F6'):'#334155');

    var tooltip = '';
    if(hasSess){
      tooltip = hasSess.map(function(item){
        var time = item.s.st ? item.s.st+'~'+item.s.et : '';
        var place = item.s.place || '';
        return (item.idx+1)+'회차'+(time?' · '+time:'')+(place?' · '+place:'');
      }).join('&#10;');
    }

    cells += '<div style="position:relative;display:flex;align-items:center;justify-content:center;">'
      +'<div class="cal-day'+(hasSess?' cal-day-has':'')+'" '
      +(hasSess?'data-tip="'+tooltip+'"':'')+' style="'
      +'width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;'
      +'font-size:11px;font-weight:'+(hasSess?'800':'500')+';cursor:'+(hasSess?'default':'default')+';'
      +'color:'+txtCol+';'
      +(hasSess?'background:#4F46E5;box-shadow:0 2px 6px rgba(79,70,229,.35);':'')
      +'">'
      +d
      +(hasSess?'<span style="position:absolute;bottom:1px;right:1px;width:4px;height:4px;border-radius:50%;background:#fff;opacity:.7"></span>':'')
      +'</div></div>';
  }

  // 뒤 빈칸
  var totalCells = startDow + lastDay.getDate();
  var remainder = totalCells % 7;
  if(remainder > 0){
    for(var r=0;r<7-remainder;r++) cells += '<div></div>';
  }

  var filledCount = allDates.length;
  var totalCount  = ds.length;
  var pct = totalCount > 0 ? Math.round(filledCount/totalCount*100) : 0;

  return '<div style="padding:14px 16px">'
    // 헤더
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<div style="font-size:13px;font-weight:800;color:#0F172A">'+calYear+'년 '+monthNames[calMonth]+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-size:10px;font-weight:700;color:#94A3B8">'+filledCount+'/'+totalCount+' 회차 입력</span>'
        +'<div style="width:60px;height:4px;background:#E2E8F0;border-radius:99px;overflow:hidden">'
          +'<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#4F46E5,#7C3AED);border-radius:99px;transition:width .4s ease"></div>'
        +'</div>'
      +'</div>'
    +'</div>'
    // 요일 헤더
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">'+dayHeaders+'</div>'
    // 날짜 그리드
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">'+cells+'</div>'
    // 범례
    +'<div style="display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #F8FAFC">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:#4F46E5;flex-shrink:0"></div>'
      +'<span style="font-size:10px;color:#94A3B8;font-weight:600">회차 일정 있음 · 마우스 오버 시 상세 정보</span>'
    +'</div>'
  +'</div>';
}

      + '</div>';
    }
  }

  return '<div class="ovl" data-action="closequickupload">'
    + '<div class="mdl" style="width:560px;max-height:88vh;display:flex;flex-direction:column" data-stop="1">'

          + '<div>'
            + '<div style="font-size:14px;font-weight:800">퀵업로드</div>'
            + '<div style="font-size:11px;color:#94A3B8;margin-top:1px">영상을 한 번에 업로드하고 커리큘럼을 자동 구성합니다</div>'

        + '</div>'
        + '<button data-action="closequickupload" style="background:none;border:none;cursor:pointer;color:#94A3B8">'+ic('x',17)+'</button>'
      + '</div>'

      // 스크롤 영역
      + '<div style="flex:1;overflow-y:auto;padding:20px">'

        // STEP 1: 파일 업로드
        + '<div style="margin-bottom:20px">'
          + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'
            + '<div style="width:20px;height:20px;border-radius:50%;background:'+(fCount>0?'#4F46E5':'#E2E8F0')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
              + '<span style="font-size:9px;font-weight:800;color:#fff">1</span>'
            + '</div>'
            + '<span style="font-size:12px;font-weight:800;color:#0F172A">영상 파일 선택</span>'
            + (fCount>0 ? '<span class="bdg bg" style="font-size:9px">'+fCount+'개 선택됨</span>' : '')
          + '</div>'

          + (fCount > 0 ? fileRows : '')

          // 업로드 드롭존
          + '<label data-action="quickuploadfiles" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;border:2px dashed '+(fCount>0?'#A5B4FC':'#CBD5E1')+';border-radius:14px;background:'+(fCount>0?'#EEF2FF':'#FAFBFC')+';cursor:pointer;transition:all .2s">'
            + '<div style="font-size:28px">'+(fCount>0?'➕':'📁')+'</div>'
            + '<div style="font-size:12px;font-weight:700;color:'+(fCount>0?'#4F46E5':'#64748B')+'">'+(fCount>0?'파일 추가하기':'영상 파일을 여기에 드래그하거나 클릭하세요')+'</div>'
            + '<div style="font-size:10px;color:#94A3B8">MP4, MOV, AVI 등 동영상 파일 · 다중 선택 가능</div>'
            + '<input type="file" multiple accept="video/*" style="display:none" onchange="handleQuickUploadFiles(this)">'
          + '</label>'
        + '</div>'

        // STEP 2: 배치 방식 선택 (파일 있을 때만)
        + (fCount > 0 ? (
          '<div style="margin-bottom:20px">'
            + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'
              + '<div style="width:20px;height:20px;border-radius:50%;background:'+(mode?'#4F46E5':'#E2E8F0')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
                + '<span style="font-size:9px;font-weight:800;color:#fff">2</span>'
              + '</div>'
              + '<span style="font-size:12px;font-weight:800;color:#0F172A">배치 방식 선택</span>'
            + '</div>'
            + (isMany ? '<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start">'
                + ic('info',12,'#F97316')
                + '<div style="font-size:11px;color:#9A3412;line-height:1.6"><strong>'+fCount+'개 영상이 감지되었습니다.</strong><br>많은 영상은 커리큘럼별로 분산하는 것을 권장합니다.</div>'
              + '</div>' : '')
            + '<div style="display:flex;gap:10px">'
              + modeCard('per-chapter','🗂️','커리큘럼마다 배치',
                  '영상을 커리큘럼별로 균등하게 분산합니다',
                  ['3~5개씩 묶어 커리큘럼 자동 생성','커리큘럼 수 = 영상 수 ÷ 묶음 크기','각 커리큘럼 독립 진행 가능'],
                  '#4F46E5','#F0F4FF')
              + modeCard('per-page','📄','페이지로 배치',
                  '하나의 커리큘럼 안에 모든 영상을 순서대로 배치합니다',
                  ['기존 커리큘럼에 항목으로 추가','순서 학습에 적합','진도율 단일 관리'],
                  '#7C3AED','#F5F3FF')
            + '</div>'
            + resultPreview
          + '</div>'
        ) : '')

      + '</div>'

      // 푸터
      + '<div class="mf" style="justify-content:space-between">'
        + '<span style="font-size:11px;color:#94A3B8">'+(mode===null&&fCount>0?'배치 방식을 선택하세요':mode?'커리큘럼에 바로 적용됩니다':'')+'</span>'
        + '<div style="display:flex;gap:8px">'
          + '<button data-action="closequickupload" class="btn bs2" style="padding:8px 16px;font-size:12px">취소</button>'
          + '<button data-action="applyquickupload"'
            + ' style="padding:8px 20px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;'
            + (mode&&fCount>0 ? 'background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3);' : 'background:#F1F5F9;color:#CBD5E1;cursor:not-allowed;')
            + '">'+(mode&&fCount>0?'⚡ 커리큘럼 자동 구성':'적용 불가')+'</button>'
        + '</div>'
      + '</div>'

    + '</div></div>';
}

function previewModalHTML(){
  // ── 타입별 메타 ─────────────────────────────────────────────────────────
  var TMETA = {
    video : {icon:'🎬', label:'동영상', bg:'#DBEAFE', col:'#2563EB'},
    exam  : {icon:'📝', label:'시험/퀴즈', bg:'#EDE9FE', col:'#7C3AED'},
    survey: {icon:'📊', label:'설문', bg:'#FAE8FF', col:'#9333EA'},
    doc   : {icon:'📄', label:'문서', bg:'#F1F5F9', col:'#64748B'},
    map   : {icon:'📍', label:'오프라인', bg:'#D1FAE5', col:'#059669'}
  };

  // ── 실제 커리큘럼 데이터 조립 ────────────────────────────────────────
  var chapters = [];

  if(S.ctype === 'offline'){
    // 오프라인: 회차를 커리큘럼 아이템으로 변환
    var offSessions = getDisplaySessions();
    var sessItems = offSessions.map(function(s, i){
      var dateStr = s.date ? s.date.replace(/-/g,'.') : '일정 미입력';
      var timeStr = s.st ? ' '+s.st+(s.et?'~'+s.et:'') : '';
      return {
        title: (i+1)+'회차 — 오프라인 교육',
        type:  'map',
        sub:   dateStr + timeStr + (s.place ? ' · '+s.place : ''),
        isReq: S.rule === 'all'
      };
    });
    chapters.push({num:1, title:'현장 교육 회차 (오프라인)', items: sessItems});
    // 부가 학습 요소
    if(S.offItems.length > 0){
      chapters.push({num:2, title:'부가 학습 요소', items: S.offItems.slice()});
    }
  } else {
    // Ch.01 — 기본 챕터 (항목이 없어도 표시)
    chapters.push({
      num: 1,
      title: '오리엔테이션 및 기초 학습',
      items: S.rmItems.slice()
    });

    // 블렌디드 전용 Ch.02
    if(S.ctype === 'blended'){
      chapters.push({
        num: 2,
        title: '현장 실습 및 네트워킹',
        items: [{title:'현장 출석 체크', type:'map', sub:'OFFLINE SESSION LINKED', isReq:true}]
      });
    }

    // 커스텀 챕터 (mods)
    var baseNum = S.ctype === 'blended' ? 3 : 2;
    S.mods.forEach(function(m, idx){
      chapters.push({
        num: baseNum + idx,
        title: m.title || ('새 커리큘럼 ' + (baseNum + idx)),
        items: (m.items || []).slice()
      });
    });
  }

  var totalItems = 0;
  chapters.forEach(function(ch){ totalItems += ch.items.length; });
  var ctypeLbl = {online:'온라인', offline:'오프라인', blended:'블렌디드'}[S.ctype] || '-';

  // ── 챕터 행 HTML ────────────────────────────────────────────────────
  function renderChapter(ch, ci){
    var numStr  = String(ch.num).padStart(2,'0');
    var isFirst = (ci === 0);
    var hdrBg   = isFirst ? '#F0F4FF' : '#F8FAFC';
    var hdrBd   = isFirst ? '#C7D2FE' : '#E2E8F0';
    var numBg   = isFirst ? '#4F46E5' : '#475569';

    // 항목 행
    var itemsHTML = '';
    if(ch.items.length === 0){
      itemsHTML =
        '<div style="padding:16px;text-align:center;border-top:1px solid #F1F5F9">'
        + '<span style="font-size:11px;color:#CBD5E1;font-weight:600">아직 항목이 없습니다</span>'
        + '</div>';
    } else {
      itemsHTML = ch.items.map(function(item, ii){
        var mt   = TMETA[item.type] || TMETA.doc;
        var isDone = (ci === 0 && ii === 0);
        var reqBg  = item.isReq ? '#EEF2FF' : '#F8FAFC';
        var reqCol = item.isReq ? '#4F46E5' : '#94A3B8';
        var reqBd  = item.isReq ? '#C7D2FE' : '#E2E8F0';
        var reqTxt = item.isReq ? '필수'    : '선택';

        return '<div style="display:flex;align-items:center;padding:10px 14px;border-top:1px solid #F8FAFC;gap:10px">'
          + '<span style="font-size:10px;font-weight:700;color:#CBD5E1;width:16px;text-align:center;flex-shrink:0">'+(ii+1)+'</span>'
          + '<div style="width:28px;height:28px;border-radius:8px;background:'+mt.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">'+mt.icon+'</div>'
          + '<div style="flex:1;min-width:0">'
            + '<div style="font-size:12px;font-weight:700;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.title+'</div>'
            + '<div style="font-size:9px;color:#94A3B8;margin-top:1px;text-transform:uppercase;font-weight:600">'+mt.label+(item.sub?' · '+item.sub:'')+'</div>'
          + '</div>'
          + '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;background:'+reqBg+';color:'+reqCol+';border:1px solid '+reqBd+';flex-shrink:0">'+reqTxt+'</span>'
          + '<div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;'
            +(isDone ? 'background:#4F46E5;' : 'border:1.5px solid #E2E8F0;')
            +'">'
            +(isDone ? ic('chk',9,'#fff') : '')
          + '</div>'
        + '</div>';
      }).join('');
    }

    return '<div style="margin-bottom:8px;border-radius:12px;overflow:hidden;border:1.5px solid '+hdrBd+';background:#fff">'
      // 챕터 헤더
      + '<div style="display:flex;align-items:center;padding:12px 14px;gap:8px;background:'+hdrBg+'">'
        + '<div style="width:24px;height:24px;border-radius:6px;background:'+numBg+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
          + '<span style="font-size:9px;font-weight:800;color:#fff">'+numStr+'</span>'
        + '</div>'
        + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:13px;font-weight:800;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ch.title+'</div>'
        + '</div>'
        + '<span style="font-size:10px;font-weight:700;color:#94A3B8;flex-shrink:0;background:#fff;padding:2px 8px;border-radius:99px;border:1px solid #E2E8F0">'+ch.items.length+'개</span>'
      + '</div>'
      // 항목 목록
      + '<div>'+itemsHTML+'</div>'
    + '</div>';
  }

  var chHTML = chapters.length === 0
    ? '<div style="text-align:center;padding:40px 20px"><div style="font-size:32px;margin-bottom:10px">📚</div><div style="font-size:13px;font-weight:700;color:#334155">커리큘럼이 비어있습니다</div><div style="font-size:11px;color:#94A3B8;margin-top:4px">학습 항목을 추가해주세요</div></div>'
    : chapters.map(renderChapter).join('');

  // ── 모달 조립 ───────────────────────────────────────────────────────
  return '<div class="ovl" data-action="closepreview">'
    + '<div class="mdl" style="width:460px;max-height:86vh;display:flex;flex-direction:column;background:#fff;border:1.5px solid #E2E8F0;box-shadow:0 24px 60px rgba(15,23,42,.15)" data-stop="1">'

      // 헤더
      + '<div style="padding:16px 20px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#FAFBFD">'
        + '<div>'
          + '<div style="font-size:14px;font-weight:800;color:#0F172A">커리큘럼 미리보기</div>'
          + '<div style="font-size:11px;color:#94A3B8;font-weight:600;margin-top:2px">학습자에게 보이는 구성입니다</div>'
        + '</div>'
        + '<button data-action="closepreview" style="width:28px;height:28px;border-radius:8px;background:#F1F5F9;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748B">'
          + ic('x',14)
        + '</button>'
      + '</div>'

      // 요약 스탯 바
      + '<div style="display:flex;padding:10px 20px;border-bottom:1px solid #F1F5F9;gap:0;flex-shrink:0;background:#fff">'
        + '<div style="flex:1;text-align:center;padding:4px 0">'
          + '<div style="font-size:16px;font-weight:800;color:#4F46E5">'+chapters.length+'</div>'
          + '<div style="font-size:9px;color:#94A3B8;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px">커리큘럼</div>'
        + '</div>'
        + '<div style="width:1px;background:#F1F5F9;margin:4px 0"></div>'
        + '<div style="flex:1;text-align:center;padding:4px 0">'
          + '<div style="font-size:16px;font-weight:800;color:#4F46E5">'+totalItems+'</div>'
          + '<div style="font-size:9px;color:#94A3B8;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px">학습 항목</div>'
        + '</div>'
        + '<div style="width:1px;background:#F1F5F9;margin:4px 0"></div>'
        + '<div style="flex:1;text-align:center;padding:4px 0">'
          + '<div style="font-size:16px;font-weight:800;color:#4F46E5">'+ctypeLbl+'</div>'
          + '<div style="font-size:9px;color:#94A3B8;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px">코스 유형</div>'
        + '</div>'
      + '</div>'

      // 챕터 목록 스크롤 영역
      + '<div style="flex:1;overflow-y:auto;padding:14px 16px">'+chHTML+'</div>'

      // 푸터
      + '<div style="padding:12px 20px;border-top:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#FAFBFD">'
        + '<span style="font-size:11px;color:#94A3B8;font-weight:600">총 '+chapters.length+'개 커리큘럼 · '+totalItems+'개 항목</span>'

      + '</div>'

// ─── DRAG & DROP ENGINE v3 ───────────────────────────────────────────────────
var _dnd = {
  active:      false,
  srcChId:     null,
  srcIdx:      null,
  isChapter:   false,
  srcChapterId:null,
  placeholder: null,
  overChId:    null    // 현재 hover 중인 챕터 id
};

function createPlaceholder(){
  var ph = document.createElement('div');
  ph.className = 'dz-placeholder';
  ph.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 여기에 놓기';
  return ph;
}

function removePlaceholder(){
  if(_dnd.placeholder && _dnd.placeholder.parentNode){
    _dnd.placeholder.parentNode.removeChild(_dnd.placeholder);
  }
  _dnd.placeholder = null;
}

function clearChapterOver(){
  document.querySelectorAll('.dz-chapter-over').forEach(function(x){
    x.classList.remove('dz-chapter-over');
  });
  _dnd.overChId = null;
}

function setChapterOver(rmc){
  if(!rmc) return;
  var chId = rmc.dataset.chid;
  if(_dnd.overChId === chId) return;  // 이미 같은 챕터면 skip
  clearChapterOver();
  rmc.classList.add('dz-chapter-over');
  _dnd.overChId = chId;
}

// Y 좌표 기준으로 삽입 위치의 기준 요소를 반환
function getRefElement(container, clientY){
  var items = Array.from(container.querySelectorAll('.dz-item:not(.dragging)'));
  for(var i=0; i<items.length; i++){
    var rect = items[i].getBoundingClientRect();
    if(clientY < rect.top + rect.height * 0.5){
      return items[i];
    }
  }
  return null; // 맨 끝
}

function insertPlaceholder(container, refEl){
  // 이미 같은 위치면 skip
  if(_dnd.placeholder){
    var cur = _dnd.placeholder;
    if(cur.parentNode === container){
      var expectedNext = refEl || null;
      if(cur.nextSibling === expectedNext) return;
    }
  }
  removePlaceholder();
  _dnd.placeholder = createPlaceholder();
  if(refEl){
    container.insertBefore(_dnd.placeholder, refEl);
  } else {
    container.appendChild(_dnd.placeholder);
  }
}

// 플레이스홀더 앞에 있는 dz-item 개수 = 삽입 인덱스
function getInsertIdx(container){
  if(!_dnd.placeholder || _dnd.placeholder.parentNode !== container){
    return Array.from(container.querySelectorAll('.dz-item')).length;
  }
  var idx = 0;
  var node = container.firstChild;
  while(node && node !== _dnd.placeholder){
    if(node.classList && node.classList.contains('dz-item')) idx++;
    node = node.nextSibling;
  }
  return idx;
}

function getDndLists(){
  var map = {'ch-0': S.rmItems};
  S.mods.forEach(function(m){ map['ch-mod-'+m.id] = m.items || []; });
  return map;
}

// ── 바인딩 ──────────────────────────────────────────────────────────────────
function bindDnD(){

  // ── 아이템 dragstart / dragend ──────────────────────────────────────────
  document.querySelectorAll('.dz-item').forEach(function(el){
    el.setAttribute('draggable','true');

    el.addEventListener('dragstart', function(e){
      _dnd.active    = true;
      _dnd.isChapter = false;
      _dnd.srcChId   = el.dataset.chid;
      _dnd.srcIdx    = parseInt(el.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain','');
      document.body.classList.add('is-dragging');
      setTimeout(function(){ el.classList.add('dragging'); }, 0);
    });

    el.addEventListener('dragend', function(){
      el.classList.remove('dragging');
      removePlaceholder();
      clearChapterOver();
      document.body.classList.remove('is-dragging');
      _dnd.active = false;
    });
  });

  // ── rmis + dz-chapter 전체를 드롭존으로 등록 ──────────────────────────
  // dz-chapter 전체에 이벤트 등록 (빈 챕터/아이템 없을 때도 드롭 가능)
  document.querySelectorAll('.dz-chapter, .rmis').forEach(function(el){
    var isRmis   = el.classList.contains('rmis');
    var isChapter= el.classList.contains('dz-chapter') && !isRmis;

    // chId 결정
    var chId = el.dataset.chid
      || (el.closest('.rmc') && el.closest('.rmc').dataset.chid);
    if(!chId) return;

    // rmis는 실제 삽입 컨테이너, dz-chapter는 광역 감지용
    el.addEventListener('dragover', function(e){
      if(!_dnd.active || _dnd.isChapter) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      // rmis를 직접 찾아서 플레이스홀더 삽입
      var rmc       = el.closest('.rmc') || (isRmis ? el.parentElement : null);
      var container = rmc ? rmc.querySelector('.rmis') : (isRmis ? el : null);
      if(!container) return;
      e.stopPropagation();

      // 소속 변경 하이라이트
      if(chId !== _dnd.srcChId){
        setChapterOver(rmc || el);
      } else {
        clearChapterOver();
      }

      // 플레이스홀더 위치 계산
      var ref = getRefElement(container, e.clientY);
      insertPlaceholder(container, ref);
    });

    el.addEventListener('dragleave', function(e){
      // rmc 전체 밖으로 나갔을 때만 해제
      var rmc = el.closest('.rmc') || el;
      if(rmc.contains(e.relatedTarget)) return;
      rmc.classList.remove('dz-chapter-over');
      if(_dnd.overChId === chId) _dnd.overChId = null;
      if(_dnd.placeholder){
        var c = rmc.querySelector('.rmis');
        if(c && _dnd.placeholder.parentNode === c) removePlaceholder();
      }
    });

    el.addEventListener('drop', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(!_dnd.active || _dnd.isChapter) return;
      var rmc       = el.closest('.rmc') || el;
      var container = rmc.querySelector ? rmc.querySelector('.rmis') : el;
      if(!container) return;
      var tgtIdx = getInsertIdx(container);
      removePlaceholder();
      clearChapterOver();
      dndMoveItem(_dnd.srcChId, _dnd.srcIdx, chId, tgtIdx);
    });
  });

  // ── 챕터 헤더 드래그 (챕터 순서 변경) ──────────────────────────────────
  document.querySelectorAll('.dz-chapter').forEach(function(el){
    if(el.dataset.chid === 'ch-0') return;

    el.addEventListener('dragstart', function(e){
      var handle = el.querySelector('.dz-chapter-handle');
      if(!handle || !handle.contains(e.target)) return;
      _dnd.isChapter    = true;
      _dnd.active       = true;
      _dnd.srcChapterId = el.dataset.chid;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain','');
      setTimeout(function(){ el.style.opacity = '0.4'; }, 0);
    });

    el.addEventListener('dragend', function(){
      el.style.opacity = '';
      _dnd.isChapter = false;
      _dnd.active    = false;
      clearChapterOver();
    });

    el.addEventListener('dragover', function(e){
      if(!_dnd.isChapter || _dnd.srcChapterId === el.dataset.chid) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.classList.add('dz-chapter-over');
    });

    el.addEventListener('dragleave', function(e){
      if(!el.contains(e.relatedTarget)) el.classList.remove('dz-chapter-over');
    });

    el.addEventListener('drop', function(e){
      e.preventDefault();
      el.classList.remove('dz-chapter-over');
      if(!_dnd.isChapter) return;
      var tgtChId = el.dataset.chid;
      if(_dnd.srcChapterId === tgtChId) return;
      dndReorderChapter(_dnd.srcChapterId, tgtChId);
    });
  });
}

function dndMoveItem(srcChId, srcIdx, tgtChId, tgtIdx){
  var newRmItems = S.rmItems.map(function(x){ return Object.assign({},x); });
  var newMods    = S.mods.map(function(m){
    return Object.assign({},m,{items:(m.items||[]).map(function(x){return Object.assign({},x);})});
  });

  function getList(chId){
    if(chId === 'ch-0') return newRmItems;
    var mod = newMods.find(function(m){ return 'ch-mod-'+m.id === chId; });
    return mod ? mod.items : null;
  }

  var srcList = getList(srcChId);
  var tgtList = getList(tgtChId);
  if(!srcList || !tgtList) return;

  var item = srcList.splice(srcIdx, 1)[0];
  if(!item) return;

  var adj = tgtIdx;
  if(srcChId === tgtChId && srcIdx < tgtIdx) adj--;
  adj = Math.max(0, Math.min(adj, tgtList.length));
  tgtList.splice(adj, 0, item);

  S.rmItems = newRmItems;
  S.mods    = newMods;
  refreshRoadmap();
}

function dndReorderChapter(srcChId, tgtChId){
  var srcIdx = S.mods.findIndex(function(m){ return 'ch-mod-'+m.id === srcChId; });
  var tgtIdx = S.mods.findIndex(function(m){ return 'ch-mod-'+m.id === tgtChId; });
  if(srcIdx < 0 || tgtIdx < 0 || srcIdx === tgtIdx) return;
  var newMods = S.mods.slice();
  var item = newMods.splice(srcIdx, 1)[0];
  newMods.splice(tgtIdx, 0, item);
  S.mods = newMods;
  refreshRoadmap();
}

function refreshRoadmap(){
  // 우측 패널만 targeted 재렌더 (좌측 패널·모달 건드리지 않음)
  var rp = document.querySelector('.rp');
  if(!rp) return;
  var isOff = S.ctype === 'offline';
  var html = isOff ? offRoadmapHTML() : freeRoadmapHTML();
  rp.style.opacity = '0';
  rp.style.transition = 'opacity .12s ease';
  setTimeout(function(){
    rp.innerHTML = html;
    rp.style.opacity = '1';
    bindDnD();
    // 스탯 바 커리큘럼/항목 수 즉시 갱신
    var cs = getCurriculumStats();
    var chEl = document.getElementById('qs-ch-count');
    if(chEl) chEl.textContent = cs.chCount;
    var itEl = document.getElementById('qs-item-count');
    if(itEl) itEl.textContent = cs.itemCount;
  }, 80);
}

// 파일 input 핸들러
function handleQuickUploadFiles(input){
  var fileList = Array.from(input.files).map(function(f){
    var kb = Math.round(f.size/1024);
    var size = kb>1024 ? (Math.round(kb/1024*10)/10)+'MB' : kb+'KB';
    return {name:f.name, size:size, rawSize:f.size};
  });
  S.quickUploadFiles = S.quickUploadFiles.concat(fileList);
  var wq = document.querySelector('.qu-modal-wrap');
  if(wq) wq.innerHTML = quickUploadModalHTML();
}

function _refreshViewer(){
  var vm = document.getElementById('viewer-main-content');
  if(vm) vm.innerHTML = buildViewerPageHTML(S.viewerPage);
  var sb = document.getElementById('viewer-sidebar-content');
  if(sb) sb.innerHTML = buildViewerSidebarHTML(S.viewerPage, _viewerTab);
}

function bind(){
  if(!_clickBound){
    document.getElementById('app').addEventListener('click', handleAppClick);
    _clickBound = true;
  }
  bindSessionInputs();
  bindTagInput();
  bindDnD();
  bindResizer();
}

function bindResizer(){
  var resizer = document.getElementById('rp-resizer');
  var panel   = document.getElementById('right-panel');
  if(!resizer || !panel) return;
  // 이미 바인딩 되어있으면 skip
  if(resizer._bound) return;
  resizer._bound = true;

  var startX, startW;
  resizer.addEventListener('mousedown', function(e){
    e.preventDefault();
    startX = e.clientX;
    startW = panel.offsetWidth;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });

  function onMove(e){
    // 리사이저가 왼쪽에 있으므로 왼쪽으로 드래그 = 넓어짐
    var dx = startX - e.clientX;
    var newW = Math.min(600, Math.max(280, startW + dx));
    panel.style.width = newW + 'px';
  }
  function onUp(){
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
  }
}

function bindSessionInputs(){
  document.querySelectorAll('.s-date,.s-st,.s-et,.s-pl,.s-cp').forEach(function(inp){
    inp.addEventListener('change',function(){
      var sid=parseInt(inp.dataset.sid);
      var key={'.s-date':'date','.s-st':'st','.s-et':'et','.s-pl':'place','.s-cp':'cap'}['.'+inp.className.split(' ').find(function(c){return c.startsWith('s-')})];
      if(!key) return;
      S.sessions=S.sessions.map(function(s){
        if(s.id!==sid) return s;
        var n=Object.assign({},s);
        n[key]=key==='cap'?parseInt(inp.value)||0:inp.value;
        return n;
      });
    });
  });
}

function bindTagInput(){
  var tagInput = document.getElementById('tag-input');
  if(!tagInput) return;
  tagInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && tagInput.value.trim()){
      e.preventDefault();
      var val = tagInput.value.trim();
      if(S.tags.indexOf(val) < 0){
        S.tags.push(val);
        _fullRender = true;
        upd({});
      }
      tagInput.value = '';
    }
  });
}

render();

</script>
